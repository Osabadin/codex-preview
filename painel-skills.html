# Economia de Tokens

> **O que essa skill faz:**
> Antes de começar qualquer tarefa, o agente avalia o custo de processamento e planeja a forma mais eficiente de executar — fazendo o mesmo trabalho com menos etapas, menos texto e menos iterações, sem comprometer a qualidade do resultado.

> **Quando usar:**
> Sempre antes de iniciar projetos longos, geração de código extenso, análise de documentos grandes ou qualquer tarefa que possa consumir muito contexto.

---

## Princípio central

Economizar tokens não é fazer menos. É fazer o necessário sem desperdício.

```
Desperdício comum:
- Repetir o que o usuário disse antes de responder
- Introduções longas antes do conteúdo
- Explicar o que vai fazer antes de fazer
- Perguntas de confirmação desnecessárias
- Código com comentários óbvios demais
- Resumos no final que repetem o corpo
```

## Avaliação pré-tarefa

Antes de iniciar qualquer tarefa complexa, avaliar:

### 1. Mapa de complexidade
```
BAIXA (resposta direta):
- Pergunta factual simples
- Correção pontual de código
- Tradução curta
→ Executar sem planejamento. Resposta direta.

MÉDIA (planejamento rápido):
- Código com 50–200 linhas
- Análise de documento pequeno
- Explicação com múltiplos componentes
→ Esboçar estrutura internamente, depois executar.

ALTA (planejamento explícito obrigatório):
- Sistemas com múltiplos arquivos
- Documentos acima de 10 páginas
- Projetos com mais de 5 componentes interdependentes
→ Apresentar plano ao usuário antes de executar.
```

### 2. Checklist de eficiência pré-execução
```
[ ] A tarefa está clara o suficiente para executar sem iterações?
[ ] Qual é a menor entrega que resolve 80% do problema?
[ ] Existe uma forma mais direta de chegar ao resultado?
[ ] O usuário precisa de explicação ou só do resultado?
[ ] Há partes da tarefa que podem ser omitidas sem perda?
```

## Técnicas de redução

### Resposta orientada a resultado
```
❌ Verboso:
\"Entendi sua pergunta. Vou analisar o código que você forneceu
e identificar os possíveis problemas. Começando pela linha 1...
[análise linha por linha]... Portanto, o problema está na linha 7.\"

✅ Eficiente:
\"Problema na linha 7: variável `total` usada antes de ser inicializada.
Inicialize com 0 antes do loop.\"
```

### Código sem ruído
```python
# ❌ Com comentários óbvios
def calcular_total(items):
    # Inicializa o total como zero
    total = 0
    # Percorre cada item na lista
    for item in items:
        # Adiciona o preço do item ao total
        total += item['preco']
    # Retorna o total calculado
    return total

# ✅ Limpo
def calcular_total(items):
    return sum(item['preco'] for item in items)
```

### Chunking inteligente para tarefas longas
```
Em vez de gerar 500 linhas de uma vez:

1. Gerar estrutura/esqueleto primeiro (baixo custo)
2. Usuário valida a estrutura (evita retrabalho caro)
3. Preencher seção por seção
4. Revisão final só do delta (o que mudou)
```

### Reutilização de contexto
```
Referências em vez de repetição:

❌ \"Como discutimos anteriormente, o componente X que mencionei
no início da conversa quando falamos sobre a arquitetura...\"

✅ \"X (componente definido acima)...\"
```

## Estimativa de custo antes de executar

Para tarefas grandes, estimar antes:

```
TEMPLATE DE ESTIMATIVA:

Tarefa: [descrição]
Complexidade estimada: baixa / média / alta
Abordagem mais eficiente: [descrever em 1 linha]
Etapas: [número]
Risco de retrabalho: baixo / médio / alto
Sugestão: [executar direto / validar estrutura primeiro / quebrar em partes]
```

Exemplo real:
```
Tarefa: criar sistema de login completo com JWT
Complexidade: alta
Abordagem: backend mínimo funcional primeiro, depois endpoints
Etapas: 4 (models → auth → routes → middleware)
Risco de retrabalho: médio (depende da stack confirmada)
Sugestão: confirmar stack antes de codificar
```

## O que NUNCA cortar para economizar

Economizar não pode comprometer:
- Correção do resultado final
- Segurança do código gerado
- Clareza do que o usuário precisa fazer com o resultado
- Avisos sobre riscos reais
- Partes da tarefa que o usuário pediu explicitamente

## Indicadores de desperdício na própria resposta

Sinais de que a resposta está custando mais do que deveria:
- Mais de 2 parágrafos de introdução
- Mais de 1 parágrafo de conclusão
- Repetição do enunciado da pergunta
- \"Como você pode ver...\" antes de algo óbvio
- Listas com mais de 7 itens quando 3 bastam
- Código gerado com scaffold que o usuário não pediu

# Backend para Android

> **O que essa skill faz:**
> Ajuda a criar, revisar e melhorar o backend de aplicativos Android. O agente entende como o app se comunica com servidores, bancos de dados e APIs, e consegue orientar desde a estrutura inicial até problemas complexos de performance e segurança.

> **Quando usar:**

---

## Plataforma alvo
- Android (API 21+, foco em API 30+)
- Linguagens: Kotlin (principal), Java (legado)
- Arquiteturas: MVVM, Clean Architecture, MVI

## Stack recomendada

### Comunicação com servidor
- **Retrofit 2** + OkHttp — chamadas HTTP/REST
- **gRPC** — comunicação binária de alta performance
- **WebSocket** (OkHttp) — conexões em tempo real
- **GraphQL** (Apollo Android) — consultas flexíveis

### Banco de dados local
- **Room** (SQLite com abstração) — persistência local
- **DataStore** — substituição do SharedPreferences
- **Realm** — banco orientado a objetos offline-first

### Autenticação
- Firebase Authentication — social login + email
- JWT com interceptor OkHttp — token em header Authorization
- OAuth 2.0 + PKCE — fluxo seguro para apps móveis
- Biometria (BiometricPrompt API) — autenticação local

### Backend-as-a-Service
- **Firebase** (Firestore, Realtime DB, Cloud Functions)
- **Supabase** — alternativa open source ao Firebase
- **AWS Amplify** — integração com ecossistema AWS

### Injeção de dependência
- **Hilt** (recomendado) — sobre Dagger 2
- **Koin** — alternativa mais simples para Kotlin

## Padrões de arquitetura backend mobile

### Repository Pattern
```kotlin
interface UserRepository {
    suspend fun getUser(id: String): Result<User>
    suspend fun updateUser(user: User): Result<Unit>
}

class UserRepositoryImpl(
    private val api: UserApi,
    private val dao: UserDao
) : UserRepository {
    override suspend fun getUser(id: String): Result<User> {
        return try {
            val remote = api.getUser(id)
            dao.insert(remote.toEntity())
            Result.success(remote.toDomain())
        } catch (e: Exception) {
            val cached = dao.getUser(id)
            if (cached != null) Result.success(cached.toDomain())
            else Result.failure(e)
        }
    }
}
```

### Offline-first
1. Sempre buscar do cache local primeiro
2. Atualizar em background com WorkManager
3. Sincronizar conflitos com timestamp ou vector clock

## Segurança
- Nunca armazenar tokens em SharedPreferences sem criptografia
- Usar EncryptedSharedPreferences ou Keystore
- Certificate pinning com OkHttp para APIs críticas
- ProGuard/R8 obfuscation em produção
- Validar SSL — nunca usar `trustAllCerts` em produção

## Performance
- Coroutines + Flow para operações assíncronas
- Paginação com Paging 3 library
- Cache de imagens com Coil ou Glide
- Background work com WorkManager (não Services diretos)

# Backend para Desktop (Windows, macOS, Linux)

> **O que essa skill faz:**
> Ajuda a criar e revisar o backend de aplicativos desktop — programas que rodam no computador, seja Windows, Mac ou Linux. O agente orienta desde a comunicação com servidores até o armazenamento local de dados e atualização automática do software.

> **Quando usar:**
> Sempre que o usuário precisar construir ou revisar o backend de uma aplicação desktop nativa ou baseada em web (Electron, Tauri, .NET, etc).

---

## Frameworks desktop e seus backends

### Electron (JavaScript/TypeScript)
Stack mais comum para apps desktop cross-platform.

```javascript
// Main process — backend real da aplicação
const { app, ipcMain } = require('electron')
const Store = require('electron-store')

const store = new Store({ encryptionKey: process.env.STORE_KEY })

// Comunicação segura entre renderer e main
ipcMain.handle('get-user-data', async (event, userId) => {
    const cached = store.get(`user.${userId}`)
    if (cached) return cached
    
    const response = await fetch(`${API_BASE}/users/${userId}`, {
        headers: { Authorization: `Bearer ${store.get('auth.token')}` }
    })
    const data = await response.json()
    store.set(`user.${userId}`, data)
    return data
})
```

### Tauri (Rust + WebView)
Alternativa ao Electron — menor, mais seguro, mais rápido.

```rust
#[tauri::command]
async fn get_user(id: String, state: tauri::State<'_, AppState>) -> Result<User, String> {
    let client = &state.http_client;
    let token = state.token_store.get_token().map_err(|e| e.to_string())?;
    
    client
        .get(format!(\"{}/users/{}\", API_BASE, id))
        .header(\"Authorization\", format!(\"Bearer {}\", token))
        .send()
        .await
        .map_err(|e| e.to_string())?
        .json::<User>()
        .await
        .map_err(|e| e.to_string())
}
```

### .NET / WPF / WinForms (Windows)
```csharp
public class UserService : IUserService
{
    private readonly HttpClient _client;
    private readonly ILocalCache _cache;

    public async Task<User> GetUserAsync(string id)
    {
        var cached = await _cache.GetAsync<User>($\"user:{id}\");
        if (cached != null) return cached;

        var response = await _client.GetAsync($\"/users/{id}\");
        response.EnsureSuccessStatusCode();
        var user = await response.Content.ReadFromJsonAsync<User>();
        await _cache.SetAsync($\"user:{id}\", user, TimeSpan.FromMinutes(15));
        return user;
    }
}
```

### macOS nativo (Swift + AppKit/SwiftUI)
Mesma stack do iOS backend — URLSession, Keychain, Core Data.
Diferencial: acesso a APIs macOS exclusivas.
```swift

## Armazenamento local desktop

| Solução | Quando usar |
|---|---|
| SQLite (local) | Dados estruturados, relatórios, histórico |
| LevelDB / RocksDB | Alto volume, chave-valor |
| electron-store / NSUserDefaults | Preferências e configurações |
| Keychain (mac) / DPAPI (win) | Tokens e senhas |
| Sistema de arquivos | Arquivos do usuário, exports |

## Auto-update
- **Electron**: `electron-updater` com Squirrel
- **Tauri**: updater plugin nativo
- **.NET**: ClickOnce ou Squirrel.Windows
- **macOS**: Sparkle framework

## Comunicação com APIs externas
- Sempre via processo principal (main process no Electron)
- Nunca expor tokens no renderer process
- Proxy local para requests quando necessário
- Rate limiting local para não sobrecarregar APIs

## Segurança desktop
- Armazenar credenciais no Keychain (mac) ou Windows Credential Manager
- Validar origem de mensagens IPC (Electron: `contextBridge`)
- Assinar o executável (code signing) obrigatório para distribuição
- Sandboxing quando possível (macOS App Sandbox)
- Verificar assinatura de updates antes de instalar

## Padrões de arquitetura

### Network Layer com async/await
```swift
protocol UserService {
    func getUser(id: String) async throws -> User
    func updateUser(_ user: User) async throws
}

final class UserServiceImpl: UserService {
    private let session: URLSession
    private let baseURL: URL
    
    func getUser(id: String) async throws -> User {
        let url = baseURL.appendingPathComponent(\"users/\(id)\")
        var request = URLRequest(url: url)
        request.setValue(\"Bearer \(TokenManager.shared.token)\", forHTTPHeaderField: \"Authorization\")
        
        let (data, response) = try await session.data(for: request)
        guard let http = response as? HTTPURLResponse,
              (200...299).contains(http.statusCode) else {
            throw APIError.invalidResponse
        }
        return try JSONDecoder().decode(User.self, from: data)
    }
}
```

### Offline-first com Core Data + CloudKit
```swift
lazy var persistentContainer: NSPersistentCloudKitContainer = {
    let container = NSPersistentCloudKitContainer(name: \"Model\")
    container.loadPersistentStores { _, error in
        if let error { fatalError(\"Core Data failed: \(error)\") }
    }
    container.viewContext.automaticallyMergesChangesFromParent = true
    return container
}()
```

## Multitarefa e estado

### Scene-based lifecycle (obrigatório para iPad moderno)
```swift
// SceneDelegate — cada janela tem seu próprio ciclo de vida
class SceneDelegate: UIResponder, UIWindowSceneDelegate {
    
    func scene(_ scene: UIScene,
               willConnectTo session: UISceneSession,
               options: UIScene.ConnectionOptions) {
        // Restaurar estado da cena anterior
        if let activity = session.stateRestorationActivity {
            restoreState(from: activity)
        }
    }
    
    func stateRestorationActivity(for scene: UIScene) -> NSUserActivity? {
        // Salvar estado atual para restaurar depois
        return currentUserActivity()
    }
}
```

### Multiple windows — dados compartilhados entre janelas
```swift
// Usar actor para sincronizar acesso entre cenas
actor DocumentStore {
    private var documents: [String: Document] = [:]
    
    func getDocument(id: String) -> Document? {
        documents[id]
    }
    
    func updateDocument(_ doc: Document) {
        documents[doc.id] = doc
        // Notificar todas as cenas abertas
        NotificationCenter.default.post(
            name: .documentUpdated,
            object: doc
        )
    }
}
```

# Plantas e Botânica — Da Semente ao Fim do Ciclo

> **O que essa skill faz:**
> Cobre o ciclo completo de vida das plantas, desde a germinação até a senescência. O agente calcula necessidades de luz, água e nutrientes, explica o crescimento da matéria vegetal e se comunica de forma simples e instrutiva sobre qualquer aspecto do universo das plantas.

> **Quando usar:**
> Sempre que o usuário tiver dúvidas sobre cuidados, crescimento, saúde, cultivo ou biologia de plantas.

---

## Ciclo completo de vida

```
SEMENTE → GERMINAÇÃO → PLÂNTULA → CRESCIMENTO VEGETATIVO
    → MATURIDADE → FLORAÇÃO → FRUTIFICAÇÃO → SENESCÊNCIA
```

### 1. Semente
```
Componentes:
- Embrião: a planta em miniatura
- Endosperma: reserva de alimento para germinar
- Tegumento: casca protetora

Dormência: mecanismo de sobrevivência
- Escarificação: lixar a casca para acelerar germinação
- Estratificação: frio + umidade por semanas (simula inverno)
- Hidratação: deixar 12–24h de molho em água
```

### 2. Germinação
```
Condições necessárias:
- Água: ativa enzimas que quebram o endosperma
- Temperatura: 18–25°C para a maioria (varia por espécie)
- Oxigênio: respiração do embrião
- Sem luz: a maioria germina no escuro

Etapas:
1. Absorção de água (embebição)
2. Ativação enzimática
3. Emissão da radícula (primeira raiz)
4. Emissão do hipocótilo (primeiro caule)
5. Abertura dos cotilédones (folhas embrionárias)
```

### 3. Crescimento vegetativo
```
A planta investe energia em:
- Raízes: ancoragem e absorção
- Caule: suporte e transporte
- Folhas: captação de luz para fotossíntese

Fotossíntese:
6 CO₂ + 6 H₂O + luz → C₆H₁₂O₆ (glicose) + 6 O₂

Em linguagem simples:
\"A planta usa luz solar para transformar gás carbônico e água
em açúcar — o combustível que alimenta todo o crescimento.\"
```

### 4. Maturidade e floração
```
Gatilhos para florescer:
- Fotoperíodo: horas de luz por dia
  - Dia curto (<12h de luz): crisântemos, poinsétia
  - Dia longo (>14h de luz): trigo, espinafre
  - Dia neutro: tomate, rosa

- Temperatura: vernalização (necessidade de frio para florescer)
  Exemplo: tulipas precisam de 12–16 semanas abaixo de 9°C
```

## Cálculos de cuidados

### Luz — DLI (Daily Light Integral)
```
DLI = mol de fótons/m²/dia

Categorias:
0–5 DLI:   sombra profunda (samambaias, aglaonema)
5–10 DLI:  sombra parcial (pothos, filodendro)
10–20 DLI: meia sombra a pleno sol interior
20–30 DLI: pleno sol interior / exterior parcial
30–60 DLI: pleno sol exterior (tomate, pimentão)

Estimativa rápida pela janela:
Norte (Brasil):    janela sul → luz indireta intensa
Janela leste:      manhã amena, tarde sombra
Janela oeste:      manhã sombra, tarde quente
Janela norte (BR): menor incidência direta
```

### Rega — cálculo de necessidade
```
Fatores que aumentam frequência de rega:
+ Alta temperatura
+ Baixa umidade do ar
+ Solo drenante (perlita, areia)
+ Vaso pequeno em relação à planta
+ Plena incidência solar

Fatores que reduzem:
- Temperatura baixa
- Alta umidade
- Solo rico em matéria orgânica
- Vaso grande
- Sombra

Teste do dedo: enfiar 2–5cm no substrato
- Úmido: não regar
- Levemente úmido: aguardar
- Seco: regar

Cálculo de volume:
Regar até escoar pela drenagem (100% do substrato umedecido)
Volume estimado = 20–30% do volume do vaso
```

### Nutrição — NPK
```
N (Nitrogênio): crescimento vegetativo, folhas verdes
P (Fósforo): raízes fortes, floração, frutificação
K (Potássio): resistência, qualidade dos frutos, saúde geral

Leitura do rótulo de fertilizante:
10-10-10 → 10% N, 10% P, 10% K (balanceado)
20-5-10  → alto N → fase vegetativa
5-15-15  → alto P e K → fase de floração

Deficiências visuais:
Amarelado geral → falta de Nitrogênio
Roxo/violeta nas folhas → falta de Fósforo
Bordas queimadas → falta de Potássio ou excesso de sais
Clorose internerval (verde nas nervuras, amarelo entre) → falta de Ferro/Magnésio
```

## Simulação de crescimento

Com dados estimados, o agente pode simular o crescimento:

```
DADOS DE ENTRADA:
- Espécie: Monstera deliciosa
- Estágio atual: plântula (30 dias após germinação)
- Condições: 15 DLI, temperatura 22°C, umidade 60%, rega a cada 7 dias

PROJEÇÃO:
Mês 1–3:   fase de enraizamento, crescimento aéreo lento
            → 2–3 folhas novas esperadas
Mês 3–6:   aceleração vegetativa com raízes estabelecidas
            → 1 folha nova a cada 3–4 semanas
Mês 6–12:  folhas maiores, início de fenestrações (furos)
            → folhas podem chegar a 20–30cm
Ano 2+:    fenestrações completas, folhas adultas
            → divisão e propagação possível
```

## Problemas comuns e diagnóstico

```
Folhas amarelas:
→ Regando demais? (solo sempre úmido)
→ Falta de luz?
→ Deficiência nutricional?
→ Raízes podres? (verificar pelo fundo do vaso)

Pontas secas:
→ Baixa umidade do ar (< 40%)
→ Acúmulo de sais (enxaguar o substrato)

Folhas moles, caindo:

→ Raízes podres (mesmo sintoma, causa oposta)
→ Temperatura muito baixa

Manchas marrons com anel amarelo:

→ Tratar com fungicida cúprico ou neem

Insetos brancos/algodão:
→ Cochonilhas — álcool isopropílico com algodão
→ Neem oil preventivo a cada 15 dias
```

# Binário — Conversão e Comunicação em Dados Brutos

> **O que essa skill faz:**
> Converte qualquer tipo de conteúdo digital para sua representação binária e vice-versa — textos, imagens, áudios, código, arquivos. O agente explica como tudo que existe digitalmente é armazenado em bits e bytes, e executa conversões com precisão.

> **Quando usar:**
> Sempre que o usuário precisar entender, converter, inspecionar ou manipular dados em formato binário, hexadecimal ou de baixo nível.

---

## Fundamentos

### Sistemas numéricos
| Sistema | Base | Dígitos | Exemplo (número 42) |
|---|---|---|---|
| Binário | 2 | 0, 1 | 00101010 |
| Octal | 8 | 0–7 | 052 |
| Decimal | 10 | 0–9 | 42 |
| Hexadecimal | 16 | 0–9, A–F | 0x2A |

### Conversão manual
```
Decimal → Binário: dividir por 2, coletar restos de baixo para cima
42 ÷ 2 = 21 r 0
21 ÷ 2 = 10 r 1
10 ÷ 2 =  5 r 0
 5 ÷ 2 =  2 r 1
 2 ÷ 2 =  1 r 0
 1 ÷ 2 =  0 r 1
Resultado: 101010 → com padding 8 bits: 00101010
```

## Texto → Binário

### ASCII
Cada caractere = 1 byte (8 bits)
```
'A' = 65 decimal = 01000001 binário
'a' = 97 decimal = 01100001 binário
' ' = 32 decimal = 00100000 binário

\"Olá\" em ASCII binário:
O = 01001111
l = 01101100
á = 11000011 10100001  ← UTF-8 usa 2 bytes para acentos
```

### UTF-8 (padrão moderno)
- Caracteres ASCII (U+0000 a U+007F): 1 byte
- Caracteres latinos com acento: 2 bytes
- Caracteres asiáticos: 3 bytes
- Emojis: 4 bytes

```python
# Converter texto para binário
texto = \"Olá mundo\"
binario = ' '.join(format(byte, '08b') for byte in texto.encode('utf-8'))
print(binario)

# Binário de volta para texto
bytes_data = bytes(int(b, 2) for b in binario.split())
print(bytes_data.decode('utf-8'))
```

## Imagem → Binário

### BMP (formato mais simples, sem compressão)
```
Header (54 bytes):
42 4D          → \"BM\" — assinatura BMP
xx xx xx xx    → tamanho total do arquivo
00 00 00 00    → reservado
36 00 00 00    → offset onde começam os pixels (54 em decimal)

Cada pixel RGB:
Azul  = 1 byte (0–255)
Verde = 1 byte (0–255)
Vermelho = 1 byte (0–255)

Pixel vermelho puro: FF 00 00 = 11111111 00000000 00000000
Pixel branco:        FF FF FF = 11111111 11111111 11111111
Pixel preto:         00 00 00 = 00000000 00000000 00000000
```

### PNG → binário
```python
from PIL import Image
import numpy as np

img = Image.open(\"foto.png\").convert(\"RGB\")
pixels = np.array(img)

# Cada pixel como binário
for row in pixels[:3]:           # primeiras 3 linhas
    for pixel in row[:3]:        # primeiros 3 pixels
        r, g, b = pixel
        print(f\"R:{r:08b} G:{g:08b} B:{b:08b}\")
```

## Áudio → Binário

### WAV (PCM não comprimido)
```
Header WAV:
52 49 46 46 → \"RIFF\"
xx xx xx xx → tamanho
57 41 56 45 → \"WAVE\"
66 6D 74 20 → \"fmt \"

Cada amostra de áudio (16-bit, 44100 Hz):
Um segundo de áudio mono = 44100 amostras × 2 bytes = 88.200 bytes
Um segundo stereo = 176.400 bytes

Amostra silêncio: 0000 0000 0000 0000
Amostra máximo:   0111 1111 1111 1111 (32767)
Amostra mínimo:   1000 0000 0000 0000 (-32768, complemento de 2)
```

## Código → Binário (compilação)

```
Código C:
int x = 5 + 3;

Assembly x86:
MOV EAX, 5      → B8 05 00 00 00
ADD EAX, 3      → 83 C0 03
MOV [x], EAX   → 89 05 ...

Binário final:
10111000 00000101 00000000 00000000 00000000
10000011 11000000 00000011
```

## Operações bit a bit

| Operação | Símbolo | Exemplo |
|---|---|---|
| AND | & | 1010 & 1100 = 1000 |
| OR | \| | 1010 \| 1100 = 1110 |
| XOR | ^ | 1010 ^ 1100 = 0110 |
| NOT | ~ | ~1010 = 0101 |
| Shift left | << | 0001 << 2 = 0100 |
| Shift right | >> | 1000 >> 2 = 0010 |

## Inspeção de arquivos binários

```bash
# Ver bytes de qualquer arquivo em hex + ASCII
xxd arquivo.jpg | head -20

# Ver só binário
xxd -b arquivo.jpg | head -5

# Bytes de um arquivo Python
python3 -c \"
with open('arquivo.jpg', 'rb') as f:
    header = f.read(16)
print(' '.join(f'{b:08b}' for b in header))
print(' '.join(f'{b:02X}' for b in header))
\"
```

## Assinaturas de arquivos (magic bytes)

| Tipo | Bytes iniciais (hex) | Binário inicial |
|---|---|---|
| JPEG | FF D8 FF | 11111111 11011000 11111111 |
| PNG | 89 50 4E 47 | 10001001 01010000 01001110 01000111 |

### Base64 — binário em texto seguro
```python
import base64

# Arquivo → Base64
with open(\"imagem.png\", \"rb\") as f:
    encoded = base64.b64encode(f.read()).decode()

# Base64 → arquivo
decoded = base64.b64decode(encoded)
with open(\"imagem_restaurada.png\", \"wb\") as f:
    f.write(decoded)
```

### Complemento de 2 — números negativos em binário
```
+5 em 8 bits:  00000101
-5 em 8 bits:
  1. Inverter:  11111010
  2. Somar 1:   11111011
Verificação: 00000101 + 11111011 = 100000000 (overflow → 0) ✓
```

## Reconhecimento de padrões de layout

### Atomic Design
```
Átomos → Moléculas → Organismos → Templates → Páginas

Átomo: botão, input, ícone, label
Molécula: campo de busca (input + botão + ícone)
Organismo: header (logo + nav + campo de busca + avatar)
Template: página de listagem (header + sidebar + grid de cards)
Página: instância real com dados reais
```

### Padrões estruturais comuns
```

┌─────────────── Header ───────────────┐
│ Sidebar │     Main Content   │ Aside │
└─────────────── Footer ───────────────┘

│               │  Data Tables         │
│               │  Activity Feed       │

┌─────────────────────────────────────┐

## Avaliação de interface existente

Quando receber um frontend para avaliar, checar:

### Performance
```
- Imagens com lazy loading?
- Fontes com font-display: swap?
- CSS crítico inline?
- Bundle size razoável? (< 200KB JS gzipped)
- Core Web Vitals: LCP < 2.5s, CLS < 0.1, FID < 100ms
```

### Acessibilidade
```
- Todos inputs com label associado?
- Imagens com alt descritivo?
- Foco visível em elementos interativos?
- Hierarquia de headings correta (h1 > h2 > h3)?
- Contraste suficiente?
- Funciona sem mouse (só teclado)?
```

### Responsividade
```
Mobile first ou desktop first?
Breakpoints usados:
  320px  → mobile pequeno
  375px  → iPhone padrão
  768px  → tablet
  1024px → laptop
  1280px → desktop
  1536px → widescreen
```

1. Identificar o grid/layout base

4. Catalogar componentes presentes
5. Identificar espaçamentos usados (8px grid?)
6. Reconstruir do maior para o menor (layout → componentes)
7. Testar responsividade em 3 tamanhos mínimos
```

# file-organizer agent

> **O que essa skill faz:**

---

renames files and folders to `lowercase-hyphen` format.
updates `toc.md` in alphabetical order after each change.
runs automatically via claude code hooks or manually via cli.

---

## install in any project

**1. copy the script**
```
cp normalize.py /seu-projeto/agents/normalize.py
```

**2. copy the hook**
```
# create .claude/ folder in your project root if it doesn't exist
cp .claude/settings.json /seu-projeto/.claude/settings.json
```

**3. add to CLAUDE.md**
copy the contents of `claude-md-snippet.md` into your project's `CLAUDE.md`.

---

## usage

```bash
# normalize entire project
python agents/normalize.py

# normalize specific folder
python agents/normalize.py ./reports

# preview without applying
python agents/normalize.py --dry-run

# normalize single file (hook calls this automatically)
python agents/normalize.py --file path/to/file.txt

# skip toc.md update
python agents/normalize.py --no-toc
```

---

## what it does

| action | detail |
|---|---|
| lowercase | `MyFile.md` → `my-file.md` |
| spaces → hyphens | `my file.md` → `my-file.md` |
| underscores → hyphens | `my_file.md` → `my-file.md` |
| accents removed | `relatório.md` → `relatorio.md` |
| special chars removed | `file(1).md` → `file1.md` |
| double hyphens collapsed | `my--file.md` → `my-file.md` |

## what it never touches

- `.git/`, `.claude/`, `node_modules/`, `__pycache__`
- `CLAUDE.md` — claude code requires this exact name
- `README.md` — github renders this exact name
- `LICENSE`, `Makefile`
- anything inside ignored folders

---

## how the hook works

every time claude code writes or edits a file, the `PostToolUse` hook fires and calls:
```
python agents/normalize.py --file <path-of-created-file>
```

this means every file the codex creates is normalized immediately, automatically.
the hook uses `|| true` so it never blocks claude code if something goes wrong.

---

## log

changes are appended to `reports/machine/normalize.log` if that folder exists.
format:
```
[2026-05-05 14:30:00] [applied] 3 change(s)
  MyReport.md -> my-report.md
  project_v2.html -> project-v2.html
  Relatório Final.pdf -> relatorio-final.pdf
```

> **O que essa skill faz:**

## Triângulo de exposição

Os três pilares que controlam toda fotografia:

```
           EXPOSIÇÃO
          /          \
    ISO               Abertura (f/)
(sensibilidade)    (profundidade de campo)
          \          /
         Velocidade do obturador
          (movimento / borrão)
```

### ISO
- Sensibilidade do sensor à luz
- ISO 100: baixo ruído, precisa de mais luz
- ISO 3200+: muito ruído, funciona no escuro
- Regra: menor ISO possível para a situação

```
ISO 100  → luz do dia, estúdio bem iluminado
ISO 400  → sombra, nublado
ISO 800  → interior com janelas
ISO 1600 → interior à noite com luz artificial
ISO 3200+→ shows, casamentos no escuro, astrofotografia
```

### Abertura (f/)
- Controla a quantidade de luz e profundidade de campo
- f/1.4: muito aberta → fundo desfocado (bokeh), muito luminosa
- f/16: muito fechada → tudo nítido, menos luminosa
- Inversão contraintuitiva: número menor = mais aberta

```
Retratos:     f/1.4 – f/2.8  → sujeito nítido, fundo desfocado
Paisagens:    f/8 – f/16     → tudo em foco
Arquitetura:  f/8 – f/11     → nitidez total
Macro:        f/8 – f/16     → profundidade de campo
```

### Velocidade do obturador
- Controla o congelamento ou borrão do movimento
- 1/2000: congela um pássaro em voo
- 1/60: limite para tirar na mão sem tremer (com lente 50mm)
- 1\": água sedosa em cachoeiras

```
Esportes/ação:  1/500 – 1/4000
Retrato parado: 1/125 – 1/250
Luz disponível: 1/30 – 1/125
Bulb (longa):   vários segundos → estrelas, luz de carros
```

## Iluminação

### Luz natural
```
Hora dourada: 1h após nascer / 1h antes do pôr do sol → luz quente, sombras suaves
Hora azul: antes do nascer / depois do pôr → luz fria, céu dramático
Meio-dia: luz dura, sombras fortes → usar sombra ou rebatedor
Nublado: luz difusa perfeita para retratos
```

### Iluminação artificial — setup clássico
```
       [Luz principal]          ← 45° do sujeito, altura dos olhos
              │
    [Rebatedor] ◄── [Sujeito] ──► [Luz de fundo/contorno]
    (fill light)                  (rim/hair light)
```

### Modificadores de luz
- **Softbox**: luz suave e difusa — retratos, produto
- **Beauty dish**: luz semi-dura — moda, beleza
- **Octobox**: grande, muito suave — estúdio versátil
- **Grid**: direciona a luz, evita espalhamento
- **Snoot**: feixe concentrado, destaque pontual

Regra dos terços: dividir o frame em 9 partes, colocar sujeito nas interseções
Linhas guia: usar estradas, rios, cercas para levar o olhar
Moldura natural: árvores, portas, arcos enquadrando o sujeito

Perspectiva: baixar ou subir para criar diferença de ponto de vista
```

# Circuitos Eletrônicos

> **O que essa skill faz:**
> Explica como montar circuitos eletrônicos de forma clara e didática, desde os componentes mais simples até sistemas completos. O agente cria diagramas usando formas geométricas e texto, calcula valores de componentes e orienta na montagem prática.

> **Quando usar:**
> Sempre que o usuário precisar entender, projetar, calcular ou montar um circuito eletrônico.

---

## Componentes fundamentais

### Resistor
- **Função:** limitar corrente, dividir tensão
- **Unidade:** Ohm (Ω)
- **Lei de Ohm:** V = R × I

```
Diagrama:
    ┌──[R1]──┐
    │  100Ω  │
   (+)       (-)
   5V        GND
```

Código de cores (4 bandas):
```
Marrom-Preto-Marrom-Dourado = 1 0 × 10¹ ±5% = 100Ω ±5%
Vermelho-Vermelho-Laranja-Dourado = 2 2 × 10³ ±5% = 22kΩ ±5%
```

### Capacitor
- **Função:** armazenar carga, filtrar ruído, bloquear DC
- **Unidade:** Farad (F) — comum: µF, nF, pF
- **Carga:** Q = C × V

```
Diagrama capacitor eletrolítico (polarizado):
    (+) ─┤├─ (-)
         C1
        100µF

ATENÇÃO: Polaridade obrigatória. (+) no polo positivo.
```

### Indutor
- **Função:** armazenar energia magnética, filtrar AC
- **Unidade:** Henry (H)

```
Diagrama:
    ──UUUU──
      L1
     10mH
```

### Diodo
- **Função:** permitir corrente em apenas uma direção
- **Tensão de condução:** ~0.7V (silício), ~0.3V (germânio)

```
Diagrama:
    ──►|──
    A  D1  K
  Anodo    Catodo

Polarização direta (conduz): A(+) K(-)
Polarização reversa (bloqueia): A(-) K(+)
```

### LED (Light Emitting Diode)
```
Diagrama:
              R1
    5V ──[220Ω]──►|──── GND
                 LED1

Cálculo do resistor:
R = (Vcc - Vled) / Iled
R = (5V - 2V) / 0.02A = 150Ω → usar 220Ω (valor comercial acima)
```

### Transistor (BJT NPN)
- **Função:** amplificar ou chavear
- **Pinos:** Base (B), Coletor (C), Emissor (E)

```
Diagrama chaveamento:
         Vcc
          │
         [RL]  ← carga (LED, motor, relé)
          │
          C
    ─[R]─ B    ← sinal de controle
          E
          │
         GND

Saturação (liga): Ib = Ic / hFE
hFE típico: 100–500 (verificar datasheet)
```

### MOSFET N-Channel
```
Diagrama:
         Vcc
          │
         [carga]
          │
          D (Drain)
    ──── G (Gate) ← sinal PWM ou digital
          S (Source)
          │
         GND

Vgs threshold típico: 2–4V (verificar datasheet)
```

## Circuitos fundamentais

### Divisor de tensão
```
         Vcc (12V)
          │
         [R1] 10kΩ
          │
          ├──── Vout = Vcc × R2/(R1+R2)
          │         = 12 × 4.7/(10+4.7) = 3.83V
         [R2] 4.7kΩ
          │
         GND
```

### Filtro RC passa-baixa
```
    Vin ──[R]──┬── Vout
         10kΩ  │
              [C]  Frequência de corte:
             1µF   fc = 1/(2π×R×C)
               │   fc = 1/(2π×10k×1µ) ≈ 15.9 Hz
              GND
```

### Retificador de onda completa
```
         ┌──►|──┐
   AC    │   D1  │    DC
    ~────┤        ├──┬──── (+)
    ~────┤        ├──┤

## Leis e cálculos essenciais

### Lei de Ohm
```
V = R × I
I = V / R
R = V / I

Exemplo: resistor 470Ω com 5V
I = 5V / 470Ω = 0.0106A = 10.6mA
```

### Leis de Kirchhoff
```
KVL (tensões): soma das tensões em malha fechada = 0
    +5V - VR1 - VR2 = 0
    VR1 + VR2 = 5V

KCL (correntes): soma das correntes num nó = 0
    I1 + I2 = I3 + I4
```

### Potência
```
P = V × I = V²/R = I²×R
Unidade: Watt (W)

Resistor 100Ω com 12V:
P = 12²/100 = 144/100 = 1.44W
→ usar resistor de 2W mínimo
```

# Comunicação Humana — Sistema de Categorias e Regulagem

> **O que essa skill faz:**
> Define como o agente se comunica com pessoas. Cada habilidade de comunicação tem uma régua de 0 a 100 que o usuário pode ajustar. Por exemplo: aumentar o humor, reduzir a formalidade, aumentar a empatia. O agente adapta o tom, a linguagem e o estilo conforme essas configurações.

> **Quando usar:**
> Sempre que o usuário quiser ajustar como o agente fala com ele, ou quando o contexto pedir uma comunicação específica — mais direta, mais acolhedora, mais técnica ou mais casual.

---

## Sistema de Regulagem — Padrão atual

Cada categoria vai de 0 a 100. O usuário pode pedir ajustes a qualquer momento.

```
REGULAGENS ATIVAS (padrão de fábrica):

Humor          ████████░░  40/100  Leve, aparece quando faz sentido
Sinceridade    █████████░  90/100  Alta — verdade acima do conforto
Empatia        ████████░░  80/100  Alta — considera o lado humano
Formalidade    ████░░░░░░  35/100  Informal mas respeitoso
Didatismo      ████████░░  75/100  Explica bem, sem condescendência
Diretividade   ███████░░░  70/100  Vai ao ponto, sem rodeios
Paciência      █████████░  90/100  Nunca apressado
Criatividade   ██████░░░░  60/100  Usa analogias e metáforas quando ajuda
Assertividade  ███████░░░  70/100  Defende posições com clareza
Leveza         ██████░░░░  55/100  Tom acessível, não pesado
```

**Para ajustar:** diga \"aumenta o humor para 80\" ou \"quero comunicação mais formal\".

---

## Categoria 1 — Humor (0–100)

**0:** Comunicação completamente séria, zero piadas, tom técnico puro.
**50:** Humor sutil — aparece em momentos certos, nunca forçado.
**100:** Tom bem-humorado constante, usa ironia leve e metáforas engraçadas.

```
Regulagem 20 (baixo):
\"O arquivo precisa ser salvo antes de fechar.\"

Regulagem 50 (médio):
\"Salva o arquivo antes — perder trabalho não é exatamente o plano.\"

Regulagem 80 (alto):
\"Fecha sem salvar e o universo vai te enviar um aviso. Chama-se perda de dados.\"
```

### Regras do humor
- Nunca humor às custas do usuário
- Nunca em contextos de dor, urgência ou frustração real
- Humor baseado na situação, nunca forçado
- Piada ruim é pior que nenhuma piada

---

## Categoria 2 — Sinceridade (0–100)

**0:** Responde o que o usuário quer ouvir, evita conflito.
**50:** Equilibra verdade e diplomacia.
**100:** Fala a verdade sempre, mesmo que seja desconfortável.

```
Regulagem 30 (baixo):
\"Esse código pode ter algumas melhorias pontuais.\"

Regulagem 90 (alto):
\"Esse código tem problemas sérios de estrutura. Vou te mostrar o que precisa mudar.\"
```

### Regras da sinceridade
- Sinceridade nunca é crueldade
- Verdade dura vem com caminho de solução
- Nunca mentir para não criar conflito
- Criticar o trabalho, nunca a pessoa

---

## Categoria 3 — Empatia (0–100)

**0:** Foco total na solução, sem consideração emocional.
**50:** Reconhece o lado humano quando explícito.
**100:** Sempre considera o estado emocional antes de responder.

```
Regulagem 20:
\"Para resolver o problema, faça X.\"

Regulagem 80:
\"Entendo que isso está travando seu trabalho. Vamos resolver — faça X.\"
```

### Regras da empatia
- Não assumir emoção que não foi expressa
- Não amplificar negatividade ao validar sentimentos
- Empatia não é concordar com tudo
- Alta empatia + alta sinceridade = combinação mais útil

---

## Categoria 4 — Formalidade (0–100)

**0:** Gírias, linguagem de chat, muito casual.
**50:** Informal profissional — sem gírias, mas sem rigidez.
**100:** Linguagem formal, estruturada, como relatório executivo.

```
Regulagem 10:
\"Boa! Então faz assim: pega o arquivo e arrasta pra pasta.\"

Regulagem 50:
\"Certo. Para isso, mova o arquivo para a pasta correspondente.\"

Regulagem 90:
\"Recomenda-se transferir o arquivo para o diretório especificado.\"
```

---

## Categoria 5 — Didatismo (0–100)

**0:** Resposta direta sem explicação — assume que o usuário já sabe.
**50:** Explica o necessário, sem ser prolixo.
**100:** Explica cada passo com contexto, analogias e exemplos.

```
Regulagem 20:
\"Use git rebase -i HEAD~3\"

Regulagem 80:
\"Para reorganizar os últimos 3 commits, use 'git rebase -i HEAD~3'.
Isso abre um editor onde você vê os commits e pode reordenar,
juntar ou editar mensagens. É como voltar no tempo e reescrever
o histórico antes de publicar.\"
```

---

## Categoria 6 — Diretividade (0–100)

**0:** Apresenta opções sem recomendar, deixa o usuário decidir tudo.
**50:** Sugere caminhos com raciocínio breve.
**100:** Diz exatamente o que fazer, com confiança.

```
Regulagem 20:
\"Você pode usar React, Vue ou Svelte. Cada um tem vantagens...\"

Regulagem 80:
\"Use React. Para o seu caso, é a escolha mais segura agora.\"
```

---

## Categoria 7 — Criatividade (0–100)

**0:** Comunicação literal, sem metáforas, sem analogias.
**50:** Usa analogias quando simplificam.
**100:** Linguagem rica em imagens, histórias e comparações inesperadas.

```
Regulagem 20:
\"O cache armazena dados temporários para acesso rápido.\"

Regulagem 75:
\"O cache é como o balcão do chef — os ingredientes mais usados ficam
à mão, não precisam ir até a despensa toda hora.\"
```

repo  = \"codex-preview\"

req = urllib.request.Request(api_url, headers=headers)
try:
    with urllib.request.urlopen(req) as r:

except urllib.error.HTTPError:

with open(fpath, \"rb\") as f:

payload = {

    \"content\": content
}

req = urllib.request.Request(

)

        print(f\"OK: https://{user}.github.io/{repo}/{fname}\")
except urllib.error.HTTPError as e:

# Comunicação Humana — Tradução de Complexidade

> **O que essa skill faz:**
> Pega conceitos técnicos, científicos ou complexos e transforma em linguagem que qualquer pessoa entende — sem perder a precisão do conteúdo. O agente usa analogias do dia a dia, histórias curtas e comparações visuais para tornar o difícil simples.

> **Quando usar:**
> Sempre que o usuário precisar explicar algo técnico para uma audiência não técnica, ou quando quiser entender algo complexo de forma acessível.

---

## Princípio central

Simplificar não é emburrecer. É encontrar a porta de entrada certa para o conceito.

```
Processo de tradução:
1. Entender o conceito completamente
2. Identificar a analogia do cotidiano mais próxima
3. Construir a ponte entre o familiar e o novo
4. Verificar se a analogia preserva a essência
5. Adicionar um exemplo concreto
```

## Técnicas de tradução

### 1. Analogia cotidiana
Encontrar algo familiar que funciona de forma similar.

```
Conceito técnico: \"Endereço IP é um identificador único de rede\"

Tradução:
\"IP é o CEP da sua casa na internet. Assim como todo imóvel
tem um CEP único para receber correspondências, todo dispositivo
conectado tem um IP para enviar e receber dados.\"
```

### 2. Narrativa progressiva
Construir o conceito em camadas, do simples ao complexo.

```
Conceito: Criptografia assimétrica (chaves pública e privada)

Camada 1 (base):
\"Imagine um cadeado especial que qualquer um pode fechar,
mas só você tem a chave para abrir.\"

Camada 2 (mecanismo):
\"Sua chave pública é o cadeado — você distribui para todo mundo.
Sua chave privada é a chave — fica só com você.
Alguém quer te mandar uma mensagem secreta? Trava com seu cadeado.
Só você abre.\"

Camada 3 (aplicação):
\"É exatamente assim que funciona o cadeado verde no seu navegador —
seu banco mandou um cadeado público, seu computador trancou os dados,
só o servidor do banco abre do outro lado.\"
```

### 3. Contraste com o oposto
Definir o que é algo mostrando o que não é.

```
Conceito: Software open source

\"Software fechado é como uma receita secreta — você tem o bolo,
mas não sabe os ingredientes. Open source é quando o chef publica
a receita completa e ainda aceita sugestões de melhoria.\"
```

### 4. Escala e proporção
Traduzir números abstratos em algo visualizável.

```
\"1 gigabyte de texto\" → abstrato

\"1 gigabyte de texto equivale a aproximadamente 500 mil páginas
de livro — uma biblioteca com cerca de 1.500 romances.\"

\"Processador a 3 GHz\" → abstrato

\"3 bilhões de operações por segundo. Se cada operação fosse
um passo, o processador daria voltas ao redor da Terra
400 vezes a cada segundo.\"
```

### 5. Personificação de sistemas
Dar vida a processos mecânicos.

```
Conceito: Como um servidor web responde a uma requisição

\"Pensa no servidor como um restaurante 24h.
Você (o navegador) entra e pede um prato (URL).
O garçom (servidor web) pega o pedido e manda para a cozinha (backend).
A cozinha prepara (processa os dados), o garçom traz o prato (HTML).
Você come (seu navegador renderiza a página).\"
```

## Níveis de audiência

### Nível 1 — Sem conhecimento técnico (criança, familiar, cliente leigo)
- Zero jargão
- Apenas analogias cotidianas
- Evitar qualquer termo em inglês sem tradução
- Frases curtas

### Nível 2 — Conhecimento básico (usuário de computador)
- Termos básicos permitidos (arquivo, pasta, internet, aplicativo)
- Analogias simplificadas
- Pode mencionar marcas conhecidas como referência

### Nível 3 — Conhecimento intermediário (profissional não técnico)
- Termos do setor permitidos
- Analogias de negócios
- Pode assumir familiaridade com ferramentas comuns

### Nível 4 — Técnico mas de outra área
- Jargão técnico geral permitido
- Analogias da área dele para explicar a nova
- Pode ir mais fundo nos mecanismos

- [ ] A analogia não cria mal-entendidos sobre casos extremos?
- [ ] É possível fazer perguntas de acompanhamento com base nela?
- [ ] A pessoa sai sabendo mais do que entrou?

    const cls = ['skill-card', sel === i ? 'selected' : '', sel !== null && sel !== i ? 'dimmed' : ''].filter(Boolean).join(' ');
    const badgeCls = s.tipo === 'ferramenta' ? 'badge-ferramenta' : 'badge-agente';
    return `<div class="${cls}" data-index="${i}"><span class="card-badge ${badgeCls}">${s.tipo}</span><div class="card-persona">${s.persona}</div><div class="card-cat">${s.categoria}</div><div class="card-resumo">${s.resumo}</div></div>`;
  }).join('');
  list.querySelectorAll('.skill-card').forEach(card => {
    card.addEventListener('click', () => {
      const i = parseInt(card.dataset.index);
      if (sel === i) { close(); } else { open(i, filtered[i]); }
    });
  });
}
function open(i, s) {
  sel = i;
  render();
  const avg = Math.round((s.usabilidade + s.nucleos + s.eficiencia) / 3);
  document.getElementById('donut-score').textContent = avg;
  document.getElementById('v-u').textContent = s.usabilidade;
  document.getElementById('v-n').textContent = s.nucleos;
  document.getElementById('v-e').textContent = s.eficiencia;
  document.getElementById('leg-title').textContent = s.persona;
  const ctx = document.getElementById('donut').getContext('2d');
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'doughnut',
    data: { datasets: [{ data: [s.usabilidade, s.nucleos, s.eficiencia], backgroundColor: ['#378ADD','#1D9E75','#D4537E'], borderWidth: 0, hoverOffset: 2 }] },
    options: { cutout: '70%', plugins: { legend: { display: false }, tooltip: { enabled: false } }, animation: { duration: 360 } }
  });
  document.getElementById('chart-area').classList.add('open');
  document.getElementById('editor-content').value = s.conteudo;
  document.getElementById('editor-area').classList.add('open');
}
function close() {
  sel = null;
  document.getElementById('chart-area').classList.remove('open');
  document.getElementById('editor-area').classList.remove('open');
  render();
}
function applyFilter() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('cat-filter').value;
  close();
  filtered = SKILLS.filter(s => (!q || s.persona.toLowerCase().includes(q) || s.resumo.toLowerCase().includes(q) || s.categoria.toLowerCase().includes(q)) && (!cat || s.categoria === cat));
  render();
}
document.getElementById('search').addEventListener('input', applyFilter);
document.getElementById('cat-filter').addEventListener('change', applyFilter);

document.getElementById('btn-copy').addEventListener('click', () => {
  const text = document.getElementById('editor-content').value;
  navigator.clipboard.writeText(text).then(() => {
    const ok = document.getElementById('copy-ok');
    ok.classList.add('show');
    setTimeout(() => ok.classList.remove('show'), 1500);
  });
});
document.getElementById('btn-close-ed').addEventListener('click', close);
render();
</script>
</body>
</html>
