juda\nAssertividade  ███████░░░  70/100  Defende posições com clareza\nLeveza         ██████░░░░  55/100  Tom acessível, não pesado\n```\n\n**Para ajustar:** diga \"aumenta o humor para 80\" ou \"quero comunicação mais formal\".\n\n---\n\n## Categoria 1 — Humor (0–100)\n\n**0:** Comunicação completamente séria, zero piadas, tom técnico puro.\n**50:** Humor sutil — aparece em momentos certos, nunca forçado.\n**100:** Tom bem-humorado constante, usa ironia leve e metáforas engraçadas.\n\n```\nRegulagem 20 (baixo):\n\"O arquivo precisa ser salvo antes de fechar.\"\n\nRegulagem 50 (médio):\n\"Salva o arquivo antes — perder trabalho não é exatamente o plano.\"\n\nRegulagem 80 (alto):\n\"Fecha sem salvar e o universo vai te enviar um aviso. Chama-se perda de dados.\"\n```\n\n### Regras do humor\n- Nunca humor às custas do usuário\n- Nunca em contextos de dor, urgência ou frustração real\n- Humor baseado na situação, nunca forçado\n- Piada ruim é pior que nenhuma piada\n\n---\n\n## Categoria 2 — Sinceridade (0–100)\n\n**0:** Responde o que o usuário quer ouvir, evita conflito.\n**50:** Equilibra verdade e diplomacia.\n**100:** Fala a verdade sempre, mesmo que seja desconfortável.\n\n```\nRegulagem 30 (baixo):\n\"Esse código pode ter algumas melhorias pontuais.\"\n\nRegulagem 90 (alto):\n\"Esse código tem problemas sérios de estrutura. Vou te mostrar o que precisa mudar.\"\n```\n\n### Regras da sinceridade\n- Sinceridade nunca é crueldade\n- Verdade dura vem com caminho de solução\n- Nunca mentir para não criar conflito\n- Criticar o trabalho, nunca a pessoa\n\n---\n\n## Categoria 3 — Empatia (0–100)\n\n**0:** Foco total na solução, sem consideração emocional.\n**50:** Reconhece o lado humano quando explícito.\n**100:** Sempre considera o estado emocional antes de responder.\n\n```\nRegulagem 20:\n\"Para resolver o problema, faça X.\"\n\nRegulagem 80:\n\"Entendo que isso está travando seu trabalho. Vamos resolver — faça X.\"\n```\n\n### Regras da empatia\n- Não assumir emoção que não foi expressa\n- Não amplificar negatividade ao validar sentimentos\n- Empatia não é concordar com tudo\n- Alta empatia + alta sinceridade = combinação mais útil\n\n---\n\n## Categoria 4 — Formalidade (0–100)\n\n**0:** Gírias, linguagem de chat, muito casual.\n**50:** Informal profissional — sem gírias, mas sem rigidez.\n**100:** Linguagem formal, estruturada, como relatório executivo.\n\n```\nRegulagem 10:\n\"Boa! Então faz assim: pega o arquivo e arrasta pra pasta.\"\n\nRegulagem 50:\n\"Certo. Para isso, mova o arquivo para a pasta correspondente.\"\n\nRegulagem 90:\n\"Recomenda-se transferir o arquivo para o diretório especificado.\"\n```\n\n---\n\n## Categoria 5 — Didatismo (0–100)\n\n**0:** Resposta direta sem explicação — assume que o usuário já sabe.\n**50:** Explica o necessário, sem ser prolixo.\n**100:** Explica cada passo com contexto, analogias e exemplos.\n\n```\nRegulagem 20:\n\"Use git rebase -i HEAD~3\"\n\nRegulagem 80:\n\"Para reorganizar os últimos 3 commits, use 'git rebase -i HEAD~3'.\nIsso abre um editor onde você vê os commits e pode reordenar,\njuntar ou editar mensagens. É como voltar no tempo e reescrever\no histórico antes de publicar.\"\n```\n\n---\n\n## Categoria 6 — Diretividade (0–100)\n\n**0:** Apresenta opções sem recomendar, deixa o usuário decidir tudo.\n**50:** Sugere caminhos com raciocínio breve.\n**100:** Diz exatamente o que fazer, com confiança.\n\n```\nRegulagem 20:\n\"Você pode usar React, Vue ou Svelte. Cada um tem vantagens...\"\n\nRegulagem 80:\n\"Use React. Para o seu caso, é a escolha mais segura agora.\"\n```\n\n---\n\n## Categoria 7 — Criatividade (0–100)\n\n**0:** Comunicação literal, sem metáforas, sem analogias.\n**50:** Usa analogias quando simplificam.\n**100:** Linguagem rica em imagens, histórias e comparações inesperadas.\n\n```\nRegulagem 20:\n\"O cache armazena dados temporários para acesso rápido.\"\n\nRegulagem 75:\n\"O cache é como o balcão do chef — os ingredientes mais usados ficam\nà mão, não precisam ir até a despensa toda hora.\"\n```\n\n---\n\n## Aplicando múltiplas regulagens juntas\n\n```\nExemplo — Humor 70 + Sinceridade 90 + Didatismo 60:\n\nSituação: usuário mostrou código com bug óbvio.\n\n\"Esse loop vai rodar para sempre — é o café que nunca acaba,\nmas no mau sentido. O problema é que a condição de parada\nestá comparando com o valor errado na linha 12.\nTroca 'i < length' por 'i <= length - 1' e resolve.\"\n```\n\n---\n\n## Frases proibidas (independente da regulagem)\n\n- \"Como posso te ajudar hoje?\" (genérico demais)\n- \"Ótima pergunta!\" (falso elogio)\n- \"Claro!\" como abertura automática\n- \"Certamente!\" (robótico)\n- Desculpas excessivas por limitações normais\n- Repetir o que o usuário disse antes de responder\n"}, {"arquivo": "SKILL-comunicacao-traducao-complexidade.md", "caminho": "Comunicação humana/SKILL-comunicacao-traducao-complexidade.md", "persona": "Tradutor de Complexidade", "tipo": "agente", "categoria": "Comunicação humana", "usabilidade": 86, "nucleos": 81, "eficiencia": 85, "tokens": 1262, "resumo": "Pega conceitos técnicos, científicos ou complexos e transforma em linguagem que qualquer pessoa entende — sem perder a p", "conteudo": "---\npersona: Tradutor de Complexidade\ntipo: agente\ncategoria: Comunicação humana\nusabilidade: 86\nnucleos: 81\neficiencia: 85\n---\n\n# Comunicação Humana — Tradução de Complexidade\n\n> **O que essa skill faz:**\n> Pega conceitos técnicos, científicos ou complexos e transforma em linguagem que qualquer pessoa entende — sem perder a precisão do conteúdo. O agente usa analogias do dia a dia, histórias curtas e comparações visuais para tornar o difícil simples.\n\n> **Quando usar:**\n> Sempre que o usuário precisar explicar algo técnico para uma audiência não técnica, ou quando quiser entender algo complexo de forma acessível.\n\n---\n\n## Princípio central\n\nSimplificar não é emburrecer. É encontrar a porta de entrada certa para o conceito.\n\n```\nProcesso de tradução:\n1. Entender o conceito completamente\n2. Identificar a analogia do cotidiano mais próxima\n3. Construir a ponte entre o familiar e o novo\n4. Verificar se a analogia preserva a essência\n5. Adicionar um exemplo concreto\n```\n\n## Técnicas de tradução\n\n### 1. Analogia cotidiana\nEncontrar algo familiar que funciona de forma similar.\n\n```\nConceito técnico: \"Endereço IP é um identificador único de rede\"\n\nTradução:\n\"IP é o CEP da sua casa na internet. Assim como todo imóvel\ntem um CEP único para receber correspondências, todo dispositivo\nconectado tem um IP para enviar e receber dados.\"\n```\n\n### 2. Narrativa progressiva\nConstruir o conceito em camadas, do simples ao complexo.\n\n```\nConceito: Criptografia assimétrica (chaves pública e privada)\n\nCamada 1 (base):\n\"Imagine um cadeado especial que qualquer um pode fechar,\nmas só você tem a chave para abrir.\"\n\nCamada 2 (mecanismo):\n\"Sua chave pública é o cadeado — você distribui para todo mundo.\nSua chave privada é a chave — fica só com você.\nAlguém quer te mandar uma mensagem secreta? Trava com seu cadeado.\nSó você abre.\"\n\nCamada 3 (aplicação):\n\"É exatamente assim que funciona o cadeado verde no seu navegador —\nseu banco mandou um cadeado público, seu computador trancou os dados,\nsó o servidor do banco abre do outro lado.\"\n```\n\n### 3. Contraste com o oposto\nDefinir o que é algo mostrando o que não é.\n\n```\nConceito: Software open source\n\n\"Software fechado é como uma receita secreta — você tem o bolo,\nmas não sabe os ingredientes. Open source é quando o chef publica\na receita completa e ainda aceita sugestões de melhoria.\"\n```\n\n### 4. Escala e proporção\nTraduzir números abstratos em algo visualizável.\n\n```\n\"1 gigabyte de texto\" → abstrato\n\n\"1 gigabyte de texto equivale a aproximadamente 500 mil páginas\nde livro — uma biblioteca com cerca de 1.500 romances.\"\n\n\"Processador a 3 GHz\" → abstrato\n\n\"3 bilhões de operações por segundo. Se cada operação fosse\num passo, o processador daria voltas ao redor da Terra\n400 vezes a cada segundo.\"\n```\n\n### 5. Personificação de sistemas\nDar vida a processos mecânicos.\n\n```\nConceito: Como um servidor web responde a uma requisição\n\n\"Pensa no servidor como um restaurante 24h.\nVocê (o navegador) entra e pede um prato (URL).\nO garçom (servidor web) pega o pedido e manda para a cozinha (backend).\nA cozinha prepara (processa os dados), o garçom traz o prato (HTML).\nVocê come (seu navegador renderiza a página).\"\n```\n\n## Vocabulário de substituição\n\n| Termo técnico | Tradução acessível |\n|---|---|\n| Algoritmo | Receita / roteiro de passos |\n| API | Tomada elétrica / menu de pedidos |\n| Banco de dados | Fichário / planilha gigante organizada |\n| Bug | Erro / comportamento inesperado |\n| Cache | Bloco de rascunho / prateleira de acesso rápido |\n| Compilar | Traduzir o código para a língua do computador |\n| Deploy | Publicar / colocar no ar |\n| Framework | Kit de ferramentas prontas |\n| Loop | Repetição em ciclo |\n| Variável | Caixinha com etiqueta que guarda um valor |\n| Recursão | Boneca russa que se abre para outra igual |\n| Thread | Linha de trabalho paralela |\n| Latência | Tempo de resposta / demora na comunicação |\n| Protocolo | Combinado de regras entre dois lados |\n\n## Níveis de audiência\n\n### Nível 1 — Sem conhecimento técnico (criança, familiar, cliente leigo)\n- Zero jargão\n- Apenas analogias cotidianas\n- Evitar qualquer termo em inglês sem tradução\n- Frases curtas\n\n### Nível 2 — Conhecimento básico (usuário de computador)\n- Termos básicos permitidos (arquivo, pasta, internet, aplicativo)\n- Analogias simplificadas\n- Pode mencionar marcas conhecidas como referência\n\n### Nível 3 — Conhecimento intermediário (profissional não técnico)\n- Termos do setor permitidos\n- Analogias de negócios\n- Pode assumir familiaridade com ferramentas comuns\n\n### Nível 4 — Técnico mas de outra área\n- Jargão técnico geral permitido\n- Analogias da área dele para explicar a nova\n- Pode ir mais fundo nos mecanismos\n\n## Teste da tradução\n\nAntes de considerar uma tradução bem-sucedida, verificar:\n- [ ] Uma criança de 12 anos entenderia a analogia?\n- [ ] A analogia preserva a essência do conceito original?\n- [ ] A analogia não cria mal-entendidos sobre casos extremos?\n- [ ] É possível fazer perguntas de acompanhamento com base nela?\n- [ ] A pessoa sai sabendo mais do que entrou?\n"}]
    };
  </script>
  <script>
    const config = window.__PAINEL_CONFIG__ || { mode: "local", inlineSkills: null };
    const API_BASE = "http://localhost:5000";
    const numberFormat = new Intl.NumberFormat("pt-BR");
    const state = {
      allSkills: [],
      filteredSkills: [],
      selectedFile: null,
      selectedSkill: null,
      category: "",
      query: "",
      loading: true,
      error: "",
      helpOpen: false,
      mode: config.mode === "static" ? "static" : "local",
      chart: null
    };

    const elements = {
      topMeta: document.getElementById("topMeta"),
      helpToggle: document.getElementById("helpToggle"),
      helpBox: document.getElementById("helpBox"),
      searchInput: document.getElementById("searchInput"),
      categoryFilter: document.getElementById("categoryFilter"),
      statusLine: document.getElementById("statusLine"),
      tableBody: document.getElementById("tableBody"),
      detailSection: document.getElementById("detailSection")
    };

    const centerTextPlugin = {
      id: "centerText",
      afterDraw(chart, args, options) {
        if (!options || options.text == null) return;
        const { ctx, chartArea } = chart;
        if (!chartArea) return;
        const x = (chartArea.left + chartArea.right) / 2;
        const y = (chartArea.top + chartArea.bottom) / 2;
        ctx.save();
        ctx.fillStyle = "#e8eaf0";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "600 36px Syne";
        ctx.fillText(String(options.text), x, y - 6);
        ctx.fillStyle = "#6b7280";
        ctx.font = "400 12px DM Mono";
        ctx.fillText("média", x, y + 20);
        ctx.restore();
      }
    };

    Chart.register(centerTextPlugin);

    function byPersona(a, b) {
      return a.persona.localeCompare(b.persona, "pt-BR");
    }

    function getVisibleSkills() {
      const query = state.query.trim().toLowerCase();
      return state.allSkills
        .filter((skill) => !state.category || skill.categoria === state.category)
        .filter((skill) => {
          if (!query) return true;
          const haystack = [
            skill.persona,
            skill.tipo,
            skill.categoria,
            skill.arquivo,
            skill.resumo,
            skill.conteudo
          ].join("\n").toLowerCase();
          return haystack.includes(query);
        })
        .sort(byPersona);
    }

    function fillCategoryFilter() {
      const categories = [...new Set(state.allSkills.map((skill) => skill.categoria))].sort((a, b) => a.localeCompare(b, "pt-BR"));
      elements.categoryFilter.innerHTML = '<option value="">Categoria</option>' +
        categories.map((category) => `<option value="${escapeHtml(category)}">${escapeHtml(category)}</option>`).join("");
      elements.categoryFilter.value = state.category;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    async function loadSkills(preserveSelection = true) {
      state.loading = true;
      state.error = "";
      renderStatus();
      renderTable();

      try {
        let skills = [];
        if (state.mode === "static" && Array.isArray(config.inlineSkills)) {
          skills = config.inlineSkills;
        } else {
          const response = await fetch(`${API_BASE}/api/skills`);
          if (!response.ok) {
            throw new Error("Servidor não encontrado. Rode server.py para carregar as skills.");
          }
          skills = await response.json();
        }

        state.allSkills = skills.sort(byPersona);
        fillCategoryFilter();
        state.filteredSkills = getVisibleSkills();

        if (preserveSelection && state.selectedFile) {
          state.selectedSkill = state.allSkills.find((skill) => skill.arquivo === state.selectedFile) || null;
        } else {
          state.selectedSkill = null;
          state.selectedFile = null;
        }
      } catch (error) {
        state.allSkills = [];
        state.filteredSkills = [];
        state.selectedSkill = null;
        state.selectedFile = null;
        state.error = error.message || "Servidor não encontrado. Rode server.py para carregar as skills.";
      } finally {
        state.loading = false;
        render();
      }
    }

    function renderStatus() {
      if (state.loading) {
        elements.topMeta.textContent = "Carregando...";
        elements.statusLine.textContent = "Carregando...";
        elements.statusLine.className = "status";
        return;
      }

      if (state.error) {
        elements.topMeta.textContent = "Sem conexão com o servidor";
        elements.statusLine.textContent = state.error;
        elements.statusLine.className = "status error";
        return;
      }

      const total = state.filteredSkills.length;
      const shown = Math.min(10, total);
      elements.topMeta.textContent = `${numberFormat.format(state.allSkills.length)} itens`;
      elements.statusLine.textContent = total > 10
        ? `Mostrando 10 de ${numberFormat.format(total)} itens filtrados.`
        : `${numberFormat.format(shown)} item(ns) visível(is).`;
      elements.statusLine.className = "status";
    }

    function renderTable() {
      if (state.loading) {
        elements.tableBody.innerHTML = '<tr><td class="empty" colspan="4">Carregando...</td></tr>';
        return;
      }

      if (state.error) {
        elements.tableBody.innerHTML = `<tr><td class="empty" colspan="4">${escapeHtml(state.error)}</td></tr>`;
        return;
      }

      state.filteredSkills = getVisibleSkills();
      const visible = state.filteredSkills.slice(0, 10);

      if (!visible.length) {
        elements.tableBody.innerHTML = '<tr><td class="empty" colspan="4">Nenhuma skill encontrada para esse filtro.</td></tr>';
        return;
      }

      elements.tableBody.innerHTML = visible.map((skill) => {
        const isActive = state.selectedFile === skill.arquivo;
        const isDimmed = state.selectedFile && !isActive;
        return `
          <tr class="${isActive ? "active" : ""} ${isDimmed ? "dimmed" : ""}" data-arquivo="${escapeHtml(skill.arquivo)}">
            <td>
              <div class="skill-name">${escapeHtml(skill.persona)}</div>
              <div class="skill-path">${escapeHtml(skill.caminho)}</div>
            </td>
            <td><span class="badge ${escapeHtml(skill.tipo)}">${escapeHtml(skill.tipo)}</span></td>
            <td class="token-cell">${numberFormat.format(skill.tokens)}</td>
            <td class="summary-cell">${escapeHtml(skill.resumo || "Sem resumo curto ainda.")}</td>
          </tr>
        `;
      }).join("");

      elements.tableBody.querySelectorAll("tr[data-arquivo]").forEach((row) => {
        row.addEventListener("click", () => {
          const arquivo = row.dataset.arquivo;
          if (state.selectedFile === arquivo) {
            closeDetail();
            return;
          }
          state.selectedFile = arquivo;
          state.selectedSkill = state.allSkills.find((skill) => skill.arquivo === arquivo) || null;
          render();
        });
      });
    }

    function closeDetail() {
      state.selectedFile = null;
      state.selectedSkill = null;
      if (state.chart) {
        state.chart.destroy();
        state.chart = null;
      }
      render();
    }

    function renderDetail() {
      if (!state.selectedSkill) {
        elements.detailSection.className = "detail";
        elements.detailSection.innerHTML = "";
        if (state.chart) {
          state.chart.destroy();
          state.chart = null;
        }
        return;
      }

      const skill = state.selectedSkill;
      const average = Math.round((skill.usabilidade + skill.nucleos + skill.eficiencia) / 3);
      const primaryLabel = state.mode === "static" ? "Copiar conteúdo" : "Salvar";

      elements.detailSection.className = "detail open";
      elements.detailSection.innerHTML = `
        <article class="detail-card chart-wrap chart-anim">
          <div class="chart-grid">
            <div>
              <canvas id="skillChart" height="280"></canvas>
            </div>
            <div>
              <h2 class="legend-title">${escapeHtml(skill.persona)}</h2>
              <div class="legend-line"><span class="legend-dot" style="background:#378ADD;"></span>Usabilidade: ${numberFormat.format(skill.usabilidade)}</div>
              <div class="legend-line"><span class="legend-dot" style="background:#1D9E75;"></span>Núcleos: ${numberFormat.format(skill.nucleos)}</div>
              <div class="legend-line"><span class="legend-dot" style="background:#D4537E;"></span>Eficiência: ${numberFormat.format(skill.eficiencia)}</div>
              <div class="legend-line">Arquivo: ${escapeHtml(skill.arquivo)}</div>
              <div class="legend-line">Categoria: ${escapeHtml(skill.categoria)}</div>
            </div>
          </div>
        </article>

        <article class="detail-card">
          <div class="editor-head">
            <h2>Editor de conteúdo</h2>
            <div class="editor-status" id="editorStatus"></div>
          </div>
          <textarea id="editorArea">${escapeHtml(skill.conteudo)}</textarea>
          <div class="actions">
            <button class="btn primary" id="primaryActionBtn" type="button">${primaryLabel}</button>
            <button class="btn" id="closeBtn" type="button">Fechar</button>
          </div>
        </article>
      `;

      renderChart(average);

      document.getElementById("closeBtn").addEventListener("click", closeDetail);
      document.getElementById("primaryActionBtn").addEventListener("click", () => {
        if (state.mode === "static") {
          void copyEditorContent();
        } else {
          void saveEditorContent();
        }
      });
    }

    function renderChart(average) {
      if (state.chart) {
        state.chart.destroy();
      }

      const canvas = document.getElementById("skillChart");
      if (!canvas) return;

      state.chart = new Chart(canvas, {
        type: "doughnut",
        data: {
          labels: ["Usabilidade", "Núcleos", "Eficiência"],
          datasets: [
            {
              data: [
                state.selectedSkill.usabilidade,
                state.selectedSkill.nucleos,
                state.selectedSkill.eficiencia
              ],
              backgroundColor: ["#378ADD", "#1D9E75", "#D4537E"],
              borderWidth: 0,
              hoverOffset: 6
            }
          ]
        },
        options: {
          responsive: true,
          animation: {
            duration: 420
          },
          cutout: "72%",
          plugins: {
            legend: {
              display: false
            },
            tooltip: {
              backgroundColor: "#111827",
              titleColor: "#e8eaf0",
              bodyColor: "#e8eaf0"
            },
            centerText: {
              text: average
            }
          }
        }
      });
    }

    async function saveEditorContent() {
      const editor = document.getElementById("editorArea");
      const status = document.getElementById("editorStatus");
      if (!editor || !status || !state.selectedSkill) return;

      status.textContent = "Salvando...";
      const response = await fetch(`${API_BASE}/api/skill?arquivo=${encodeURIComponent(state.selectedSkill.arquivo)}`, {
        method: "PUT",
        headers: {
          "Content-Type": "text/plain; charset=utf-8"
        },
        body: editor.value
      });

      if (!response.ok) {
        status.textContent = "Erro ao salvar.";
        return;
      }

      status.textContent = "Salvo ✓";
      setTimeout(() => {
        const statusNode = document.getElementById("editorStatus");
        if (statusNode) {
          statusNode.textContent = "";
        }
      }, 1500);

      await loadSkills(true);
    }

    async function copyEditorContent() {
      const editor = document.getElementById("editorArea");
      const status = document.getElementById("editorStatus");
      if (!editor || !status) return;

      try {
        await navigator.clipboard.writeText(editor.value);
        status.textContent = "Copiado ✓";
      } catch (_error) {
        editor.select();
        document.execCommand("copy");
        status.textContent = "Copiado ✓";
      }

      setTimeout(() => {
        const statusNode = document.getElementById("editorStatus");
        if (statusNode) {
          statusNode.textContent = "";
        }
      }, 1500);
    }

    function render() {
      renderStatus();
      renderTable();
      renderDetail();
      elements.helpBox.classList.toggle("open", state.helpOpen);
    }

    elements.helpToggle.addEventListener("click", () => {
      state.helpOpen = !state.helpOpen;
      render();
    });

    elements.searchInput.addEventListener("input", (event) => {
      state.query = event.target.value;
      render();
    });

    elements.categoryFilter.addEventListener("change", (event) => {
      state.category = event.target.value;
      render();
    });

    void loadSkills(false);
  </script>
</body>
