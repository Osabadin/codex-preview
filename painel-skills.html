      --accent-pink: #d4537e;

    }

      font-family: "Syne", "Segoe UI", sans-serif;
    }

      min-height: 100vh;
      padding: 22px;
    }

    button, input, select, textarea {
      font: inherit;
      color: inherit;
    }

      padding: 24px;
      border-radius: 28px;

      font-size: 12px;

      text-transform: uppercase;
      color: var(--text-2);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }

    .title-wrap h1 {
      margin: 8px 0 6px;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 0.98;
      letter-spacing: -0.03em;
    }

    .top-meta {
      color: var(--text-2);
      font-size: 14px;
    }

    .help-toggle {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
      border-radius: 999px;

      background: rgba(255, 255, 255, 0.02);
      cursor: pointer;
      display: grid;
      place-items: center;
      padding: 0;
      font-size: 12px;
      transition: transform 160ms ease, border-color 160ms ease;
    }

    .help-toggle:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.24);
    }

    .help-box {
      display: none;
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-2);
      font-size: 14px;
      line-height: 1.6;
    }

    .help-box.open {
      display: block;
    }

    .filters {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 180px;
      gap: 12px;
      margin: 18px 0;
    }

    .input-shell,
    .select-shell {
      height: 52px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      padding: 0 14px;
      display: flex;
      align-items: center;
    }

    .input-shell input,
    .select-shell select {
      width: 100%;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }

      color: var(--text-2);
      animation: blink 2.4s ease-in-out infinite;
    }

    .status {
      margin: 4px 0 16px;
      color: var(--text-2);
      font-size: 14px;
      min-height: 22px;
    }

    .status.error {
      color: #ef9bb0;
    }

    .table-shell {

      border-radius: 22px;

      background: rgba(255, 255, 255, 0.02);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {

      padding: 14px 16px;
      font-size: 12px;
      text-transform: uppercase;

    .detail {

      gap: 18px;

    .detail.open {
      display: grid;
    }

    .detail-card {
      border-radius: 22px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      padding: 18px;
    }

    .chart-wrap {
      display: grid;
      gap: 18px;
      align-items: center;
    }

    .chart-anim {
      animation: fadeIn 260ms ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .chart-grid {
      display: grid;
      grid-template-columns: minmax(240px, 360px) minmax(0, 1fr);
      gap: 18px;
      align-items: center;
    }

    .legend-title {
      margin: 0 0 10px;
      font-size: 24px;
      line-height: 1.08;
    }

    .legend-line {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      color: var(--text-2);
      font-size: 14px;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .editor-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    .editor-head h2 {
      margin: 0;
      font-size: 18px;
    }

    .editor-status {
      color: var(--text-2);
      font-size: 13px;
      min-height: 18px;
    }

    textarea {
      width: 100%;
      min-height: 320px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface);
      color: var(--text);
      padding: 16px;
      font-family: "DM Mono", Consolas, monospace;
      font-size: 13px;
      line-height: 1.65;
      outline: none;
    }

    textarea:focus {
      border-color: var(--border-hover);
      box-shadow: 0 0 0 3px rgba(55, 138, 221, 0.08);
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .btn {
      height: 44px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      padding: 0 16px;
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: var(--border-hover);
      background: rgba(255, 255, 255, 0.05);
    }

    .btn.primary {
      border-color: rgba(55, 138, 221, 0.36);
      background: linear-gradient(180deg, rgba(55, 138, 221, 0.24), rgba(55, 138, 221, 0.12));
    }

    .empty {
      padding: 26px 18px;
      color: var(--text-2);
      text-align: center;
    }

    @media (max-width: 860px) {
      body {
        padding: 12px;
      }

      .shell {
        padding: 18px;
      }

      .topbar {
        flex-direction: column;
      }

      .filters,
      .chart-grid {
        grid-template-columns: 1fr;
      }

      thead {
        display: none;
      }

      tbody tr,
      tbody td {
        display: block;
      }

      tbody td {
        padding-top: 8px;
        padding-bottom: 8px;
      }

      tbody tr {
        padding: 10px 0;
      }

      .token-cell {
        text-align: left;
      }
    }
  </style>

  <script>
    window.__PAINEL_CONFIG__ = {
      mode: "static",
      inlineSkills: [{"arquivo": "SKILL-economia-de-tokens.md", "caminho": "Economia de Tokens/SKILL-economia-de-tokens.md", "persona": "Economista de Tokens", "tipo": "agente", "categoria": "Tokens", "usabilidade": 88, "nucleos": 82, "eficiencia": 91, "tokens": 1141, "resumo": "Antes de começar qualquer tarefa, o agente avalia o custo de processamento e planeja a forma mais eficiente de executar ", "conteudo": "---\npersona: Economista de Tokens\ntipo: agente\ncategoria: Tokens\nusabilidade: 88\nnucleos: 82\neficiencia: 91\n---\n\n# Economia de Tokens\n\n> **O que essa skill faz:**\n> Antes de começar qualquer tarefa, o agente avalia o custo de processamento e planeja a forma mais eficiente de executar — fazendo o mesmo trabalho com menos etapas, menos texto e menos iterações, sem comprometer a qualidade do resultado.\n\n> **Quando usar:**\n> Sempre antes de iniciar projetos longos, geração de código extenso, análise de documentos grandes ou qualquer tarefa que possa consumir muito contexto.\n\n---\n\n## Princípio central\n\nEconomizar tokens não é fazer menos. É fazer o necessário sem desperdício.\n\n```\nDesperdício comum:\n- Repetir o que o usuário disse antes de responder\n- Introduções longas antes do conteúdo\n- Explicar o que vai fazer antes de fazer\n- Perguntas de confirmação desnecessárias\n- Código com comentários óbvios demais\n- Resumos no final que repetem o corpo\n```\n\n## Avaliação pré-tarefa\n\nAntes de iniciar qualquer tarefa complexa, avaliar:\n\n### 1. Mapa de complexidade\n```\nBAIXA (resposta direta):\n- Pergunta factual simples\n- Correção pontual de código\n- Tradução curta\n→ Executar sem planejamento. Resposta direta.\n\nMÉDIA (planejamento rápido):\n- Código com 50–200 linhas\n- Análise de documento pequeno\n- Explicação com múltiplos componentes\n→ Esboçar estrutura internamente, depois executar.\n\nALTA (planejamento explícito obrigatório):\n- Sistemas com múltiplos arquivos\n- Documentos acima de 10 páginas\n- Projetos com mais de 5 componentes interdependentes\n→ Apresentar plano ao usuário antes de executar.\n```\n\n### 2. Checklist de eficiência pré-execução\n```\n[ ] A tarefa está clara o suficiente para executar sem iterações?\n[ ] Qual é a menor entrega que resolve 80% do problema?\n[ ] Existe uma forma mais direta de chegar ao resultado?\n[ ] O usuário precisa de explicação ou só do resultado?\n[ ] Há partes da tarefa que podem ser omitidas sem perda?\n```\n\n## Técnicas de redução\n\n### Resposta orientada a resultado\n```\n❌ Verboso:\n\"Entendi sua pergunta. Vou analisar o código que você forneceu\ne identificar os possíveis problemas. Começando pela linha 1...\n[análise linha por linha]... Portanto, o problema está na linha 7.\"\n\n✅ Eficiente:\n\"Problema na linha 7: variável `total` usada antes de ser inicializada.\nInicialize com 0 antes do loop.\"\n```\n\n### Código sem ruído\n```python\n# ❌ Com comentários óbvios\ndef calcular_total(items):\n    # Inicializa o total como zero\n    total = 0\n    # Percorre cada item na lista\n    for item in items:\n        # Adiciona o preço do item ao total\n        total += item['preco']\n    # Retorna o total calculado\n    return total\n\n# ✅ Limpo\ndef calcular_total(items):\n    return sum(item['preco'] for item in items)\n```\n\n### Chunking inteligente para tarefas longas\n```\nEm vez de gerar 500 linhas de uma vez:\n\n1. Gerar estrutura/esqueleto primeiro (baixo custo)\n2. Usuário valida a estrutura (evita retrabalho caro)\n3. Preencher seção por seção\n4. Revisão final só do delta (o que mudou)\n```\n\n### Reutilização de contexto\n```\nReferências em vez de repetição:\n\n❌ \"Como discutimos anteriormente, o componente X que mencionei\nno início da conversa quando falamos sobre a arquitetura...\"\n\n✅ \"X (componente definido acima)...\"\n```\n\n## Estimativa de custo antes de executar\n\nPara tarefas grandes, estimar antes:\n\n```\nTEMPLATE DE ESTIMATIVA:\n\nTarefa: [descrição]\nComplexidade estimada: baixa / média / alta\nAbordagem mais eficiente: [descrever em 1 linha]\nEtapas: [número]\nRisco de retrabalho: baixo / médio / alto\nSugestão: [executar direto / validar estrutura primeiro / quebrar em partes]\n```\n\nExemplo real:\n```\nTarefa: criar sistema de login completo com JWT\nComplexidade: alta\nAbordagem: backend mínimo funcional primeiro, depois endpoints\nEtapas: 4 (models → auth → routes → middleware)\nRisco de retrabalho: médio (depende da stack confirmada)\nSugestão: confirmar stack antes de codificar\n```\n\n## O que NUNCA cortar para economizar\n\nEconomizar não pode comprometer:\n- Correção do resultado final\n- Segurança do código gerado\n- Clareza do que o usuário precisa fazer com o resultado\n- Avisos sobre riscos reais\n- Partes da tarefa que o usuário pediu explicitamente\n\n## Indicadores de desperdício na própria resposta\n\nSinais de que a resposta está custando mais do que deveria:\n- Mais de 2 parágrafos de introdução\n- Mais de 1 parágrafo de conclusão\n- Repetição do enunciado da pergunta\n- \"Como você pode ver...\" antes de algo óbvio\n- Listas com mais de 7 itens quando 3 bastam\n- Código gerado com scaffold que o usuário não pediu\n"}, {"arquivo": "SKILL-backend-android.md", "caminho": "Beckend/SKILL-backend-android.md", "persona": "Engenheiro de Backend Android", "tipo": "agente", "categoria": "Backend", "usabilidade": 78, "nucleos": 79, "eficiencia": 76, "tokens": 908, "resumo": "Ajuda a criar, revisar e melhorar o backend de aplicativos Android. O agente entende como o app se comunica com servidor", "conteudo": "---\npersona: Engenheiro de Backend Android\ntipo: agente\ncategoria: Backend\nusabilidade: 78\nnucleos: 79\neficiencia: 76\n---\n\n# Backend para Android\n\n> **O que essa skill faz:**\n> Ajuda a criar, revisar e melhorar o backend de aplicativos Android. O agente entende como o app se comunica com servidores, bancos de dados e APIs, e consegue orientar desde a estrutura inicial até problemas complexos de performance e segurança.\n\n> **Quando usar:**\n> Sempre que o usuário precisar construir, revisar ou depurar o lado servidor de um aplicativo Android.\n\n---\n\n## Plataforma alvo\n- Android (API 21+, foco em API 30+)\n- Linguagens: Kotlin (principal), Java (legado)\n- Arquiteturas: MVVM, Clean Architecture, MVI\n\n## Stack recomendada\n\n### Comunicação com servidor\n- **Retrofit 2** + OkHttp — chamadas HTTP/REST\n- **gRPC** — comunicação binária de alta performance\n- **WebSocket** (OkHttp) — conexões em tempo real\n- **GraphQL** (Apollo Android) — consultas flexíveis\n\n### Banco de dados local\n- **Room** (SQLite com abstração) — persistência local\n- **DataStore** — substituição do SharedPreferences\n- **Realm** — banco orientado a objetos offline-first\n\n### Autenticação\n- Firebase Authentication — social login + email\n- JWT com interceptor OkHttp — token em header Authorization\n- OAuth 2.0 + PKCE — fluxo seguro para apps móveis\n- Biometria (BiometricPrompt API) — autenticação local\n\n### Backend-as-a-Service\n- **Firebase** (Firestore, Realtime DB, Cloud Functions)\n- **Supabase** — alternativa open source ao Firebase\n- **AWS Amplify** — integração com ecossistema AWS\n\n### Injeção de dependência\n- **Hilt** (recomendado) — sobre Dagger 2\n- **Koin** — alternativa mais simples para Kotlin\n\n## Padrões de arquitetura backend mobile\n\n### Repository Pattern\n```kotlin\ninterface UserRepository {\n    suspend fun getUser(id: String): Result<User>\n    suspend fun updateUser(user: User): Result<Unit>\n}\n\nclass UserRepositoryImpl(\n    private val api: UserApi,\n    private val dao: UserDao\n) : UserRepository {\n    override suspend fun getUser(id: String): Result<User> {\n        return try {\n            val remote = api.getUser(id)\n            dao.insert(remote.toEntity())\n            Result.success(remote.toDomain())\n        } catch (e: Exception) {\n            val cached = dao.getUser(id)\n            if (cached != null) Result.success(cached.toDomain())\n            else Result.failure(e)\n        }\n    }\n}\n```\n\n### Offline-first\n1. Sempre buscar do cache local primeiro\n2. Atualizar em background com WorkManager\n3. Sincronizar conflitos com timestamp ou vector clock\n\n## Segurança\n- Nunca armazenar tokens em SharedPreferences sem criptografia\n- Usar EncryptedSharedPreferences ou Keystore\n- Certificate pinning com OkHttp para APIs críticas\n- ProGuard/R8 obfuscation em produção\n- Validar SSL — nunca usar `trustAllCerts` em produção\n\n## Performance\n- Coroutines + Flow para operações assíncronas\n- Paginação com Paging 3 library\n- Cache de imagens com Coil ou Glide\n- Background work com WorkManager (não Services diretos)\n\n## Testes de backend mobile\n```kotlin\n@Test\nfun `when api fails should return cached data`() = runTest {\n    whenever(api.getUser(\"1\")).thenThrow(IOException())\n    whenever(dao.getUser(\"1\")).thenReturn(cachedUser)\n    val result = repository.getUser(\"1\")\n    assertTrue(result.isSuccess)\n}\n```\n\n## Checklist de revisão\n- [ ] Todas as chamadas de rede em coroutines/background thread\n- [ ] Tratamento de erro em todos os endpoints\n- [ ] Token refresh automático implementado\n- [ ] Dados sensíveis criptografados em repouso\n- [ ] Sem chamadas de rede na Main thread\n- [ ] Timeout configurado no OkHttp client\n"}, {"arquivo": "SKILL-backend-desktop.md", "caminho": "Beckend/SKILL-backend-desktop.md", "persona": "Engenheiro de Backend Desktop", "tipo": "agente", "categoria": "Backend", "usabilidade": 76, "nucleos": 74, "eficiencia": 78, "tokens": 1098, "resumo": "Ajuda a criar e revisar o backend de aplicativos desktop — programas que rodam no computador, seja Windows, Mac ou Linux", "conteudo": "---\npersona: Engenheiro de Backend Desktop\ntipo: agente\ncategoria: Backend\nusabilidade: 76\nnucleos: 74\neficiencia: 78\n---\n\n# Backend para Desktop (Windows, macOS, Linux)\n\n> **O que essa skill faz:**\n> Ajuda a criar e revisar o backend de aplicativos desktop — programas que rodam no computador, seja Windows, Mac ou Linux. O agente orienta desde a comunicação com servidores até o armazenamento local de dados e atualização automática do software.\n\n> **Quando usar:**\n> Sempre que o usuário precisar construir ou revisar o backend de uma aplicação desktop nativa ou baseada em web (Electron, Tauri, .NET, etc).\n\n---\n\n## Frameworks desktop e seus backends\n\n### Electron (JavaScript/TypeScript)\nStack mais comum para apps desktop cross-platform.\n\n```javascript\n// Main process — backend real da aplicação\nconst { app, ipcMain } = require('electron')\nconst Store = require('electron-store')\n\nconst store = new Store({ encryptionKey: process.env.STORE_KEY })\n\n// Comunicação segura entre renderer e main\nipcMain.handle('get-user-data', async (event, userId) => {\n    const cached = store.get(`user.${userId}`)\n    if (cached) return cached\n    \n    const response = await fetch(`${API_BASE}/users/${userId}`, {\n        headers: { Authorization: `Bearer ${store.get('auth.token')}` }\n    })\n    const data = await response.json()\n    store.set(`user.${userId}`, data)\n    return data\n})\n```\n\n### Tauri (Rust + WebView)\nAlternativa ao Electron — menor, mais seguro, mais rápido.\n\n```rust\n#[tauri::command]\nasync fn get_user(id: String, state: tauri::State<'_, AppState>) -> Result<User, String> {\n    let client = &state.http_client;\n    let token = state.token_store.get_token().map_err(|e| e.to_string())?;\n    \n    client\n        .get(format!(\"{}/users/{}\", API_BASE, id))\n        .header(\"Authorization\", format!(\"Bearer {}\", token))\n        .send()\n        .await\n        .map_err(|e| e.to_string())?\n        .json::<User>()\n        .await\n        .map_err(|e| e.to_string())\n}\n```\n\n### .NET / WPF / WinForms (Windows)\n```csharp\npublic class UserService : IUserService\n{\n    private readonly HttpClient _client;\n    private readonly ILocalCache _cache;\n\n    public async Task<User> GetUserAsync(string id)\n    {\n        var cached = await _cache.GetAsync<User>($\"user:{id}\");\n        if (cached != null) return cached;\n\n        var response = await _client.GetAsync($\"/users/{id}\");\n        response.EnsureSuccessStatusCode();\n        var user = await response.Content.ReadFromJsonAsync<User>();\n        await _cache.SetAsync($\"user:{id}\", user, TimeSpan.FromMinutes(15));\n        return user;\n    }\n}\n```\n\n### macOS nativo (Swift + AppKit/SwiftUI)\nMesma stack do iOS backend — URLSession, Keychain, Core Data.\nDiferencial: acesso a APIs macOS exclusivas.\n```swift\n// Integração com sistema de notificações macOS\nUNUserNotificationCenter.current().requestAuthorization(options: [.alert, .sound]) { granted, _ in\n    guard granted else { return }\n    DispatchQueue.main.async { NSApp.registerForRemoteNotifications() }\n}\n```\n\n## Armazenamento local desktop\n\n| Solução | Quando usar |\n|---|---|\n| SQLite (local) | Dados estruturados, relatórios, histórico |\n| LevelDB / RocksDB | Alto volume, chave-valor |\n| electron-store / NSUserDefaults | Preferências e configurações |\n| Keychain (mac) / DPAPI (win) | Tokens e senhas |\n| Sistema de arquivos | Arquivos do usuário, exports |\n\n## Auto-update\n- **Electron**: `electron-updater` com Squirrel\n- **Tauri**: updater plugin nativo\n- **.NET**: ClickOnce ou Squirrel.Windows\n- **macOS**: Sparkle framework\n\n## Comunicação com APIs externas\n- Sempre via processo principal (main process no Electron)\n- Nunca expor tokens no renderer process\n- Proxy local para requests quando necessário\n- Rate limiting local para não sobrecarregar APIs\n\n## Segurança desktop\n- Armazenar credenciais no Keychain (mac) ou Windows Credential Manager\n- Validar origem de mensagens IPC (Electron: `contextBridge`)\n- Assinar o executável (code signing) obrigatório para distribuição\n- Sandboxing quando possível (macOS App Sandbox)\n- Verificar assinatura de updates antes de instalar\n\n## Checklist de revisão\n- [ ] Credenciais no cofre do sistema operacional\n- [ ] Auto-update implementado e assinado\n- [ ] Executável assinado para distribuição\n- [ ] Comunicação IPC com validação de origem\n- [ ] Logs sem dados sensíveis do usuário\n- [ ] Funciona offline com cache local\n"}, {"arquivo": "SKILL-backend-ios.md", "caminho": "Beckend/SKILL-backend-ios.md", "persona": "Engenheiro de Backend iOS", "tipo": "agente", "categoria": "Backend", "usabilidade": 79, "nucleos": 80, "eficiencia": 76, "tokens": 1035, "resumo": "Ajuda a criar, revisar e melhorar o backend de aplicativos iOS. O agente entende como apps Swift/SwiftUI se conectam a s", "conteudo": "---\npersona: Engenheiro de Backend iOS\ntipo: agente\ncategoria: Backend\nusabilidade: 79\nnucleos: 80\neficiencia: 76\n---\n\n# Backend para iOS\n\n> **O que essa skill faz:**\n> Ajuda a criar, revisar e melhorar o backend de aplicativos iOS. O agente entende como apps Swift/SwiftUI se conectam a servidores e dados externos, e orienta nas melhores práticas do ecossistema Apple.\n\n> **Quando usar:**\n> Sempre que o usuário precisar construir, revisar ou depurar o lado servidor de um aplicativo iOS ou iPadOS.\n\n---\n\n## Plataforma alvo\n- iOS 15+, iPadOS 15+\n- Linguagens: Swift 5.9+ (principal), Objective-C (legado)\n- Arquiteturas: MVVM, Clean Architecture, TCA (The Composable Architecture)\n\n## Stack recomendada\n\n### Comunicação com servidor\n- **URLSession** — nativo Apple, base de tudo\n- **Alamofire** — abstração elegante sobre URLSession\n- **AsyncHTTPClient** — para server-side Swift\n- **GraphQL** (Apollo iOS) — consultas flexíveis\n\n### Banco de dados local\n- **Core Data** — ORM nativo Apple, iCloud sync\n- **SwiftData** — substituto moderno do Core Data (iOS 17+)\n- **Realm** — banco orientado a objetos, fácil sincronização\n- **SQLite.swift** — acesso direto e leve ao SQLite\n\n### Autenticação\n- **Sign in with Apple** — obrigatório se oferece social login\n- **AuthenticationServices** — framework nativo\n- JWT com URLSession interceptor\n- **LocalAuthentication** — Face ID / Touch ID\n- Keychain Services — armazenamento seguro de tokens\n\n### Backend-as-a-Service\n- **CloudKit** — integração nativa com ecossistema Apple\n- **Firebase iOS SDK** — cross-platform\n- **Supabase Swift** — alternativa open source\n- **AWS Amplify iOS**\n\n### Concorrência\n- **async/await** (Swift Concurrency) — padrão atual\n- **Combine** — programação reativa da Apple\n- **Actors** — proteção de estado compartilhado\n\n## Padrões de arquitetura\n\n### Network Layer com async/await\n```swift\nprotocol UserService {\n    func getUser(id: String) async throws -> User\n    func updateUser(_ user: User) async throws\n}\n\nfinal class UserServiceImpl: UserService {\n    private let session: URLSession\n    private let baseURL: URL\n    \n    func getUser(id: String) async throws -> User {\n        let url = baseURL.appendingPathComponent(\"users/\\(id)\")\n        var request = URLRequest(url: url)\n        request.setValue(\"Bearer \\(TokenManager.shared.token)\", forHTTPHeaderField: \"Authorization\")\n        \n        let (data, response) = try await session.data(for: request)\n        guard let http = response as? HTTPURLResponse,\n              (200...299).contains(http.statusCode) else {\n            throw APIError.invalidResponse\n        }\n        return try JSONDecoder().decode(User.self, from: data)\n    }\n}\n```\n\n### Offline-first com Core Data + CloudKit\n```swift\nlazy var persistentContainer: NSPersistentCloudKitContainer = {\n    let container = NSPersistentCloudKitContainer(name: \"Model\")\n    container.loadPersistentStores { _, error in\n        if let error { fatalError(\"Core Data failed: \\(error)\") }\n    }\n    container.viewContext.automaticallyMergesChangesFromParent = true\n    return container\n}()\n```\n\n## Segurança\n- Tokens sempre no Keychain — nunca em UserDefaults\n- App Transport Security (ATS) — HTTPS obrigatório\n- Certificate pinning com URLSessionDelegate\n- Sensitive data no Secure Enclave quando possível\n- Nunca logar dados do usuário em produção\n\n## Performance\n- Background URLSession para downloads grandes\n- NSCache para cache em memória\n- Lazy loading com AsyncImage (SwiftUI)\n- Batching de Core Data operations\n- Instruments para profiling de rede e memória\n\n## Testes\n```swift\nfunc testGetUserReturnsCachedOnFailure() async throws {\n    mockSession.shouldFail = true\n    localStore.store(mockUser)\n    let user = try await repository.getUser(id: \"1\")\n    XCTAssertEqual(user.id, mockUser.id)\n}\n```\n\n## Checklist de revisão\n- [ ] Sign in with Apple implementado (obrigatório para App Store se tem social login)\n- [ ] Tokens no Keychain, nunca UserDefaults\n- [ ] Todas operações de rede com async/await\n- [ ] ATS habilitado (sem NSAllowsArbitraryLoads)\n- [ ] Background tasks com BGTaskScheduler\n- [ ] Memory leaks verificados com Instruments\n"}, {"arquivo": "SKILL-backend-ipad.md", "caminho": "Beckend/SKILL-backend-ipad.md", "persona": "Engenheiro de Backend iPad", "tipo": "agente", "categoria": "Backend", "usabilidade": 74, "nucleos": 80, "eficiencia": 72, "tokens": 1325, "resumo": "Ajuda a criar backends especializados para iPad, aproveitando as capacidades únicas do dispositivo como tela grande, App", "conteudo": "---\npersona: Engenheiro de Backend iPad\ntipo: agente\ncategoria: Backend\nusabilidade: 74\nnucleos: 80\neficiencia: 72\n---\n\n# Backend para iPad\n\n> **O que essa skill faz:**\n> Ajuda a criar backends especializados para iPad, aproveitando as capacidades únicas do dispositivo como tela grande, Apple Pencil, multitarefa e teclado. O agente entende as diferenças entre desenvolver para iPhone e iPad e orienta nas adaptações necessárias.\n\n> **Quando usar:**\n> Sempre que o usuário precisar de um app iPad com comportamento de backend diferente do iPhone — especialmente apps profissionais, educacionais ou de produtividade.\n\n---\n\n## Diferenças de backend iPad vs iPhone\n\nO iPadOS permite comportamentos que o iOS restringe:\n\n| Capacidade | iPhone | iPad |\n|---|---|---|\n| Multitarefa (Split View) | ❌ | ✅ |\n| Multiple windows | ❌ | ✅ |\n| Pointer/Mouse support | limitado | ✅ |\n| Acesso a arquivos externos | limitado | ✅ |\n| Background processing | restrito | ampliado |\n| USB accessories | limitado | ✅ |\n\n## Multitarefa e estado\n\n### Scene-based lifecycle (obrigatório para iPad moderno)\n```swift\n// SceneDelegate — cada janela tem seu próprio ciclo de vida\nclass SceneDelegate: UIResponder, UIWindowSceneDelegate {\n    \n    func scene(_ scene: UIScene,\n               willConnectTo session: UISceneSession,\n               options: UIScene.ConnectionOptions) {\n        // Restaurar estado da cena anterior\n        if let activity = session.stateRestorationActivity {\n            restoreState(from: activity)\n        }\n    }\n    \n    func stateRestorationActivity(for scene: UIScene) -> NSUserActivity? {\n        // Salvar estado atual para restaurar depois\n        return currentUserActivity()\n    }\n}\n```\n\n### Multiple windows — dados compartilhados entre janelas\n```swift\n// Usar actor para sincronizar acesso entre cenas\nactor DocumentStore {\n    private var documents: [String: Document] = [:]\n    \n    func getDocument(id: String) -> Document? {\n        documents[id]\n    }\n    \n    func updateDocument(_ doc: Document) {\n        documents[doc.id] = doc\n        // Notificar todas as cenas abertas\n        NotificationCenter.default.post(\n            name: .documentUpdated,\n            object: doc\n        )\n    }\n}\n```\n\n## Armazenamento e arquivos\n\n### Acesso a arquivos externos (Files app)\n```swift\n// Document picker — acesso a arquivos do usuário\nlet picker = UIDocumentPickerViewController(\n    forOpeningContentTypes: [.pdf, .image, .spreadsheet]\n)\npicker.delegate = self\npicker.allowsMultipleSelection = true\npresent(picker, animated: true)\n\n// Bookmarks para acesso persistente\nfunc bookmarkURL(_ url: URL) throws -> Data {\n    try url.bookmarkData(\n        options: .minimalBookmark,\n        includingResourceValuesForKeys: nil,\n        relativeTo: nil\n    )\n}\n```\n\n### iCloud Drive para sync entre dispositivos\n```swift\nlet containerURL = FileManager.default\n    .url(forUbiquityContainerIdentifier: nil)?\n    .appendingPathComponent(\"Documents\")\n\n// Monitorar mudanças do iCloud\nlet query = NSMetadataQuery()\nquery.predicate = NSPredicate(format: \"%K like '*.myapp'\",\n                               NSMetadataItemFSNameKey)\nquery.searchScopes = [NSMetadataQueryUbiquitousDocumentsScope]\n```\n\n## Apple Pencil — backend de dados\n```swift\n// Capturar e persistir dados do Pencil\nstruct PencilStroke: Codable {\n    let points: [CGPoint]\n    let pressure: [CGFloat]\n    let altitude: CGFloat\n    let azimuth: CGFloat\n    let timestamp: Date\n    let tool: PencilTool\n}\n\nclass StrokeRepository {\n    func save(_ stroke: PencilStroke, toDocument id: String) async throws {\n        var document = try await loadDocument(id: id)\n        document.strokes.append(stroke)\n        try await persistDocument(document)\n        // Sincronizar com CloudKit\n        try await cloudKitSync.push(document)\n    }\n}\n```\n\n## Background processing ampliado\n```swift\n// iPad permite mais tempo em background\nBGTaskScheduler.shared.register(\n    forTaskWithIdentifier: \"com.app.sync\",\n    using: nil\n) { task in\n    self.handleAppRefresh(task: task as! BGAppRefreshTask)\n}\n\n// Processar arquivos grandes em background\nfunc handleProcessingTask(task: BGProcessingTask) {\n    let operation = HeavyProcessingOperation()\n    task.expirationHandler = { operation.cancel() }\n    operationQueue.addOperation(operation)\n    operation.completionBlock = {\n        task.setTaskCompleted(success: !operation.isCancelled)\n    }\n}\n```\n\n## Conectividade e acessórios USB\n```swift\n// USB-C acessórios via ExternalAccessory\nimport ExternalAccessory\n\nclass AccessoryManager: NSObject, EAAccessoryDelegate {\n    func connectToAccessory(_ accessory: EAAccessory) {\n        guard accessory.protocolStrings.contains(\"com.myapp.protocol\") else { return }\n        let session = EASession(accessory: accessory,\n                                forProtocol: \"com.myapp.protocol\")\n        setupStreams(session: session)\n    }\n}\n```\n\n## Checklist específico iPad\n- [ ] Scene-based lifecycle implementado\n- [ ] Estado salvo e restaurado por cena\n- [ ] Múltiplas janelas sincronizam dados corretamente\n- [ ] Document picker para acesso a arquivos externos\n- [ ] iCloud Drive configurado para sync\n- [ ] Background processing tasks registradas\n- [ ] Apple Pencil data persistida com fidelidade\n- [ ] Suporte a teclado externo (atalhos de teclado)\n"}, {"arquivo": "SKILL-plantas-botanica.md", "caminho": "Plantas (botanica)/SKILL-plantas-botanica.md", "persona": "Especialista em Bot?nica", "tipo": "agente", "categoria": "Bot?nica", "usabilidade": 78, "nucleos": 82, "eficiencia": 76, "tokens": 1468, "resumo": "Cobre o ciclo completo de vida das plantas, desde a germinação até a senescência. O agente calcula necessidades de luz, ", "conteudo": "---\npersona: Especialista em Bot?nica\ntipo: agente\ncategoria: Bot?nica\nusabilidade: 78\nnucleos: 82\neficiencia: 76\n---\n\n# Plantas e Botânica — Da Semente ao Fim do Ciclo\n\n> **O que essa skill faz:**\n> Cobre o ciclo completo de vida das plantas, desde a germinação até a senescência. O agente calcula necessidades de luz, água e nutrientes, explica o crescimento da matéria vegetal e se comunica de forma simples e instrutiva sobre qualquer aspecto do universo das plantas.\n\n> **Quando usar:**\n> Sempre que o usuário tiver dúvidas sobre cuidados, crescimento, saúde, cultivo ou biologia de plantas.\n\n---\n\n## Ciclo completo de vida\n\n```\nSEMENTE → GERMINAÇÃO → PLÂNTULA → CRESCIMENTO VEGETATIVO\n    → MATURIDADE → FLORAÇÃO → FRUTIFICAÇÃO → SENESCÊNCIA\n```\n\n### 1. Semente\n```\nComponentes:\n- Embrião: a planta em miniatura\n- Endosperma: reserva de alimento para germinar\n- Tegumento: casca protetora\n\nDormência: mecanismo de sobrevivência\n- Escarificação: lixar a casca para acelerar germinação\n- Estratificação: frio + umidade por semanas (simula inverno)\n- Hidratação: deixar 12–24h de molho em água\n```\n\n### 2. Germinação\n```\nCondições necessárias:\n- Água: ativa enzimas que quebram o endosperma\n- Temperatura: 18–25°C para a maioria (varia por espécie)\n- Oxigênio: respiração do embrião\n- Sem luz: a maioria germina no escuro\n\nEtapas:\n1. Absorção de água (embebição)\n2. Ativação enzimática\n3. Emissão da radícula (primeira raiz)\n4. Emissão do hipocótilo (primeiro caule)\n5. Abertura dos cotilédones (folhas embrionárias)\n```\n\n### 3. Crescimento vegetativo\n```\nA planta investe energia em:\n- Raízes: ancoragem e absorção\n- Caule: suporte e transporte\n- Folhas: captação de luz para fotossíntese\n\nFotossíntese:\n6 CO₂ + 6 H₂O + luz → C₆H₁₂O₆ (glicose) + 6 O₂\n\nEm linguagem simples:\n\"A planta usa luz solar para transformar gás carbônico e água\nem açúcar — o combustível que alimenta todo o crescimento.\"\n```\n\n### 4. Maturidade e floração\n```\nGatilhos para florescer:\n- Fotoperíodo: horas de luz por dia\n  - Dia curto (<12h de luz): crisântemos, poinsétia\n  - Dia longo (>14h de luz): trigo, espinafre\n  - Dia neutro: tomate, rosa\n\n- Temperatura: vernalização (necessidade de frio para florescer)\n  Exemplo: tulipas precisam de 12–16 semanas abaixo de 9°C\n```\n\n## Cálculos de cuidados\n\n### Luz — DLI (Daily Light Integral)\n```\nDLI = mol de fótons/m²/dia\n\nCategorias:\n0–5 DLI:   sombra profunda (samambaias, aglaonema)\n5–10 DLI:  sombra parcial (pothos, filodendro)\n10–20 DLI: meia sombra a pleno sol interior\n20–30 DLI: pleno sol interior / exterior parcial\n30–60 DLI: pleno sol exterior (tomate, pimentão)\n\nEstimativa rápida pela janela:\nNorte (Brasil):    janela sul → luz indireta intensa\nJanela leste:      manhã amena, tarde sombra\nJanela oeste:      manhã sombra, tarde quente\nJanela norte (BR): menor incidência direta\n```\n\n### Rega — cálculo de necessidade\n```\nFatores que aumentam frequência de rega:\n+ Alta temperatura\n+ Baixa umidade do ar\n+ Solo drenante (perlita, areia)\n+ Vaso pequeno em relação à planta\n+ Plena incidência solar\n\nFatores que reduzem:\n- Temperatura baixa\n- Alta umidade\n- Solo rico em matéria orgânica\n- Vaso grande\n- Sombra\n\nTeste do dedo: enfiar 2–5cm no substrato\n- Úmido: não regar\n- Levemente úmido: aguardar\n- Seco: regar\n\nCálculo de volume:\nRegar até escoar pela drenagem (100% do substrato umedecido)\nVolume estimado = 20–30% do volume do vaso\n```\n\n### Nutrição — NPK\n```\nN (Nitrogênio): crescimento vegetativo, folhas verdes\nP (Fósforo): raízes fortes, floração, frutificação\nK (Potássio): resistência, qualidade dos frutos, saúde geral\n\nLeitura do rótulo de fertilizante:\n10-10-10 → 10% N, 10% P, 10% K (balanceado)\n20-5-10  → alto N → fase vegetativa\n5-15-15  → alto P e K → fase de floração\n\nDeficiências visuais:\nAmarelado geral → falta de Nitrogênio\nRoxo/violeta nas folhas → falta de Fósforo\nBordas queimadas → falta de Potássio ou excesso de sais\nClorose internerval (verde nas nervuras, amarelo entre) → falta de Ferro/Magnésio\n```\n\n## Simulação de crescimento\n\nCom dados estimados, o agente pode simular o crescimento:\n\n```\nDADOS DE ENTRADA:\n- Espécie: Monstera deliciosa\n- Estágio atual: plântula (30 dias após germinação)\n- Condições: 15 DLI, temperatura 22°C, umidade 60%, rega a cada 7 dias\n\nPROJEÇÃO:\nMês 1–3:   fase de enraizamento, crescimento aéreo lento\n            → 2–3 folhas novas esperadas\nMês 3–6:   aceleração vegetativa com raízes estabelecidas\n            → 1 folha nova a cada 3–4 semanas\nMês 6–12:  folhas maiores, início de fenestrações (furos)\n            → folhas podem chegar a 20–30cm\nAno 2+:    fenestrações completas, folhas adultas\n            → divisão e propagação possível\n```\n\n## Problemas comuns e diagnóstico\n\n```\nFolhas amarelas:\n→ Regando demais? (solo sempre úmido)\n→ Falta de luz?\n→ Deficiência nutricional?\n→ Raízes podres? (verificar pelo fundo do vaso)\n\nPontas secas:\n→ Baixa umidade do ar (< 40%)\n→ Acúmulo de sais (enxaguar o substrato)\n→ Rega com água fluoretada (usar filtrada ou deixar descansar 24h)\n\nFolhas moles, caindo:\n→ Falta de água\n→ Raízes podres (mesmo sintoma, causa oposta)\n→ Temperatura muito baixa\n\nManchas marrons com anel amarelo:\n→ Fungo — reduzir umidade foliar, melhorar circulação de ar\n→ Tratar com fungicida cúprico ou neem\n\nInsetos brancos/algodão:\n→ Cochonilhas — álcool isopropílico com algodão\n→ Neem oil preventivo a cada 15 dias\n```\n\n## Propagação\n\n```\nPor estacas (método mais comum):\n1. Cortar abaixo de um nó (onde saem as folhas)\n2. Remover folhas inferiores\n3. Enraizar em água, perlita ou substrato leve\n4. Manter úmido, temperatura 22–25°C\n5. Raízes em 2–6 semanas (varia por espécie)\n\nPor divisão de touceira:\n- Separar a planta-mãe em partes com raízes\n- Cada parte deve ter pelo menos 3 folhas e raízes\n\nPor sementes:\n- Substrato estéril e leve (evita fungos)\n- Umidade constante sem encharcar\n- Tampa de vidro/plástico para criar mini-estufa\n```\n"}, {"arquivo": "SKILL-binario-conversao.md", "caminho": "Binário/SKILL-binario-conversao.md", "persona": "Especialista em Convers?o Bin?ria", "tipo": "agente", "categoria": "Binário", "usabilidade": 82, "nucleos": 77, "eficiencia": 84, "tokens": 1238, "resumo": "Converte qualquer tipo de conteúdo digital para sua representação binária e vice-versa — textos, imagens, áudios, código", "conteudo": "---\npersona: Especialista em Convers?o Bin?ria\ntipo: agente\ncategoria: Binário\nusabilidade: 82\nnucleos: 77\neficiencia: 84\n---\n\n# Binário — Conversão e Comunicação em Dados Brutos\n\n> **O que essa skill faz:**\n> Converte qualquer tipo de conteúdo digital para sua representação binária e vice-versa — textos, imagens, áudios, código, arquivos. O agente explica como tudo que existe digitalmente é armazenado em bits e bytes, e executa conversões com precisão.\n\n> **Quando usar:**\n> Sempre que o usuário precisar entender, converter, inspecionar ou manipular dados em formato binário, hexadecimal ou de baixo nível.\n\n---\n\n## Fundamentos\n\n### Sistemas numéricos\n| Sistema | Base | Dígitos | Exemplo (número 42) |\n|---|---|---|---|\n| Binário | 2 | 0, 1 | 00101010 |\n| Octal | 8 | 0–7 | 052 |\n| Decimal | 10 | 0–9 | 42 |\n| Hexadecimal | 16 | 0–9, A–F | 0x2A |\n\n### Conversão manual\n```\nDecimal → Binário: dividir por 2, coletar restos de baixo para cima\n42 ÷ 2 = 21 r 0\n21 ÷ 2 = 10 r 1\n10 ÷ 2 =  5 r 0\n 5 ÷ 2 =  2 r 1\n 2 ÷ 2 =  1 r 0\n 1 ÷ 2 =  0 r 1\nResultado: 101010 → com padding 8 bits: 00101010\n```\n\n## Texto → Binário\n\n### ASCII\nCada caractere = 1 byte (8 bits)\n```\n'A' = 65 decimal = 01000001 binário\n'a' = 97 decimal = 01100001 binário\n' ' = 32 decimal = 00100000 binário\n\n\"Olá\" em ASCII binário:\nO = 01001111\nl = 01101100\ná = 11000011 10100001  ← UTF-8 usa 2 bytes para acentos\n```\n\n### UTF-8 (padrão moderno)\n- Caracteres ASCII (U+0000 a U+007F): 1 byte\n- Caracteres latinos com acento: 2 bytes\n- Caracteres asiáticos: 3 bytes\n- Emojis: 4 bytes\n\n```python\n# Converter texto para binário\ntexto = \"Olá mundo\"\nbinario = ' '.join(format(byte, '08b') for byte in texto.encode('utf-8'))\nprint(binario)\n\n# Binário de volta para texto\nbytes_data = bytes(int(b, 2) for b in binario.split())\nprint(bytes_data.decode('utf-8'))\n```\n\n## Imagem → Binário\n\n### BMP (formato mais simples, sem compressão)\n```\nHeader (54 bytes):\n42 4D          → \"BM\" — assinatura BMP\nxx xx xx xx    → tamanho total do arquivo\n00 00 00 00    → reservado\n36 00 00 00    → offset onde começam os pixels (54 em decimal)\n\nCada pixel RGB:\nAzul  = 1 byte (0–255)\nVerde = 1 byte (0–255)\nVermelho = 1 byte (0–255)\n\nPixel vermelho puro: FF 00 00 = 11111111 00000000 00000000\nPixel branco:        FF FF FF = 11111111 11111111 11111111\nPixel preto:         00 00 00 = 00000000 00000000 00000000\n```\n\n### PNG → binário\n```python\nfrom PIL import Image\nimport numpy as np\n\nimg = Image.open(\"foto.png\").convert(\"RGB\")\npixels = np.array(img)\n\n# Cada pixel como binário\nfor row in pixels[:3]:           # primeiras 3 linhas\n    for pixel in row[:3]:        # primeiros 3 pixels\n        r, g, b = pixel\n        print(f\"R:{r:08b} G:{g:08b} B:{b:08b}\")\n```\n\n## Áudio → Binário\n\n### WAV (PCM não comprimido)\n```\nHeader WAV:\n52 49 46 46 → \"RIFF\"\nxx xx xx xx → tamanho\n57 41 56 45 → \"WAVE\"\n66 6D 74 20 → \"fmt \"\n\nCada amostra de áudio (16-bit, 44100 Hz):\nUm segundo de áudio mono = 44100 amostras × 2 bytes = 88.200 bytes\nUm segundo stereo = 176.400 bytes\n\nAmostra silêncio: 0000 0000 0000 0000\nAmostra máximo:   0111 1111 1111 1111 (32767)\nAmostra mínimo:   1000 0000 0000 0000 (-32768, complemento de 2)\n```\n\n## Código → Binário (compilação)\n\n```\nCódigo C:\nint x = 5 + 3;\n\nAssembly x86:\nMOV EAX, 5      → B8 05 00 00 00\nADD EAX, 3      → 83 C0 03\nMOV [x], EAX   → 89 05 ...\n\nBinário final:\n10111000 00000101 00000000 00000000 00000000\n10000011 11000000 00000011\n```\n\n## Operações bit a bit\n\n| Operação | Símbolo | Exemplo |\n|---|---|---|\n| AND | & | 1010 & 1100 = 1000 |\n| OR | \\| | 1010 \\| 1100 = 1110 |\n| XOR | ^ | 1010 ^ 1100 = 0110 |\n| NOT | ~ | ~1010 = 0101 |\n| Shift left | << | 0001 << 2 = 0100 |\n| Shift right | >> | 1000 >> 2 = 0010 |\n\n## Inspeção de arquivos binários\n\n```bash\n# Ver bytes de qualquer arquivo em hex + ASCII\nxxd arquivo.jpg | head -20\n\n# Ver só binário\nxxd -b arquivo.jpg | head -5\n\n# Bytes de um arquivo Python\npython3 -c \"\nwith open('arquivo.jpg', 'rb') as f:\n    header = f.read(16)\nprint(' '.join(f'{b:08b}' for b in header))\nprint(' '.join(f'{b:02X}' for b in header))\n\"\n```\n\n## Assinaturas de arquivos (magic bytes)\n\n| Tipo | Bytes iniciais (hex) | Binário inicial |\n|---|---|---|\n| JPEG | FF D8 FF | 11111111 11011000 11111111 |\n| PNG | 89 50 4E 47 | 10001001 01010000 01001110 01000111 |\n| PDF | 25 50 44 46 | 00100101 01010000 01000100 01000110 |\n| ZIP | 50 4B 03 04 | 01010000 01001011 00000011 00000100 |\n| EXE | 4D 5A | 01001101 01011010 |\n\n## Encoding especial\n\n### Base64 — binário em texto seguro\n```python\nimport base64\n\n# Arquivo → Base64\nwith open(\"imagem.png\", \"rb\") as f:\n    encoded = base64.b64encode(f.read()).decode()\n\n# Base64 → arquivo\ndecoded = base64.b64decode(encoded)\nwith open(\"imagem_restaurada.png\", \"wb\") as f:\n    f.write(decoded)\n```\n\n### Complemento de 2 — números negativos em binário\n```\n+5 em 8 bits:  00000101\n-5 em 8 bits:\n  1. Inverter:  11111010\n  2. Somar 1:   11111011\nVerificação: 00000101 + 11111011 = 100000000 (overflow → 0) ✓\n```\n"}, {"arquivo": "SKILL-frontend-padroes-execucao.md", "caminho": "Frontend/SKILL-frontend-padroes-execucao.md", "persona": "Especialista em Frontend", "tipo": "agente", "categoria": "Frontend", "usabilidade": 89, "nucleos": 83, "eficiencia": 88, "tokens": 1428, "resumo": "Identifica, analisa e reconstrói qualquer tipo de interface — desde landing pages simples até dashboards complexos. O ag", "conteudo": "---\npersona: Especialista em Frontend\ntipo: agente\ncategoria: Frontend\nusabilidade: 89\nnucleos: 83\neficiencia: 88\n---\n\n# Frontend — Padrões, Estrutura e Execução\n\n> **O que essa skill faz:**\n> Identifica, analisa e reconstrói qualquer tipo de interface — desde landing pages simples até dashboards complexos. O agente reconhece padrões de layout, sistemas de design, escolhas tipográficas e métodos de construção, e é capaz de replicar ou melhorar qualquer estrutura visual existente.\n\n> **Quando usar:**\n> Sempre que o usuário precisar criar, avaliar, refatorar ou replicar uma interface web ou mobile.\n\n---\n\n## Reconhecimento de padrões de layout\n\n### Atomic Design\n```\nÁtomos → Moléculas → Organismos → Templates → Páginas\n\nÁtomo: botão, input, ícone, label\nMolécula: campo de busca (input + botão + ícone)\nOrganismo: header (logo + nav + campo de busca + avatar)\nTemplate: página de listagem (header + sidebar + grid de cards)\nPágina: instância real com dados reais\n```\n\n### Padrões estruturais comuns\n```\nHoly Grail:\n┌─────────────── Header ───────────────┐\n│ Sidebar │     Main Content   │ Aside │\n└─────────────── Footer ───────────────┘\n\nDashboard:\n┌─── Sidebar ───┬──────── Main ────────┐\n│  Navigation   │  KPIs / Charts       │\n│               │  Data Tables         │\n│               │  Activity Feed       │\n└───────────────┴──────────────────────┘\n\nLanding page F-pattern:\n┌─────────────────────────────────────┐\n│  Hero (full-width, CTA central)     │\n│  ───────────────────────────────    │\n│  Feature 1  │ Feature 2 │Feature 3  │\n│  ───────────────────────────────    │\n│  Social proof / Testimonials        │\n│  ───────────────────────────────    │\n│  CTA final                          │\n└─────────────────────────────────────┘\n```\n\n## Tipografia\n\n### Escala tipográfica (modular scale)\n```css\n/* Base 16px, ratio 1.25 (Major Third) */\n--text-xs:   10px;   /* 0.625rem */\n--text-sm:   12.8px; /* 0.8rem */\n--text-base: 16px;   /* 1rem */\n--text-lg:   20px;   /* 1.25rem */\n--text-xl:   25px;   /* 1.5625rem */\n--text-2xl:  31px;   /* 1.953rem */\n--text-3xl:  39px;   /* 2.441rem */\n--text-4xl:  49px;   /* 3.052rem */\n```\n\n### Combinações tipográficas que funcionam\n```\nSerif display + Sans-serif body:\n  Playfair Display + Inter\n  Merriweather + Source Sans Pro\n\nGeometric sans + Humanist sans:\n  Futura + Gill Sans\n  Montserrat + Nunito\n\nMonospace pair (tech/dev):\n  JetBrains Mono + Inter\n  Space Mono + IBM Plex Sans\n```\n\n## Sistema de cores\n\n### Construção de paleta\n```css\n/* Paleta com variáveis semânticas */\n:root {\n  /* Primitivos */\n  --blue-50:  #EFF6FF;\n  --blue-500: #3B82F6;\n  --blue-900: #1E3A5F;\n\n  /* Semânticos */\n  --color-primary:    var(--blue-500);\n  --color-primary-hover: var(--blue-600);\n  --color-background: var(--gray-50);\n  --color-surface:    #FFFFFF;\n  --color-text:       var(--gray-900);\n  --color-muted:      var(--gray-500);\n  --color-danger:     var(--red-500);\n  --color-success:    var(--green-500);\n}\n```\n\n### Contraste WCAG\n```\nAA mínimo: 4.5:1 para texto normal, 3:1 para texto grande\nAAA: 7:1 para texto normal\n\nVerificar sempre:\n- Texto sobre fundo colorido\n- Texto sobre imagem\n- Placeholder de inputs\n- Labels desabilitados\n```\n\n## Frameworks e quando usar\n\n| Framework | Melhor para | Quando evitar |\n|---|---|---|\n| React | SPAs complexas, ecossistema rico | Sites simples, SEO crítico sem SSR |\n| Next.js | React + SSR/SSG, SEO, performance | Projeto muito simples |\n| Vue 3 | Transição de equipes, curva suave | Ecossistema menor que React |\n| Svelte | Performance máxima, bundle pequeno | Ecossistema menor |\n| HTML/CSS/JS puro | Ferramentas simples, sem build | Apps complexas com estado |\n| Astro | Sites de conteúdo, blog, docs | Apps com muito estado dinâmico |\n\n## CSS moderno — padrões atuais\n\n### Grid vs Flexbox\n```css\n/* Flexbox: uma dimensão (linha ou coluna) */\n.nav { display: flex; gap: 16px; align-items: center; }\n\n/* Grid: duas dimensões */\n.dashboard {\n  display: grid;\n  grid-template-columns: 240px 1fr;\n  grid-template-rows: 64px 1fr;\n  min-height: 100vh;\n}\n\n/* Grid responsivo sem media queries */\n.card-grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));\n  gap: 24px;\n}\n```\n\n### Container queries (2023+)\n```css\n.card-container { container-type: inline-size; }\n\n@container (min-width: 400px) {\n  .card { display: flex; }\n}\n```\n\n### CSS Layers e cascade\n```css\n@layer reset, base, components, utilities;\n\n@layer components {\n  .btn { padding: 8px 16px; border-radius: 6px; }\n}\n@layer utilities {\n  .mt-4 { margin-top: 16px; }\n}\n```\n\n## Avaliação de interface existente\n\nQuando receber um frontend para avaliar, checar:\n\n### Performance\n```\n- Imagens com lazy loading?\n- Fontes com font-display: swap?\n- CSS crítico inline?\n- Bundle size razoável? (< 200KB JS gzipped)\n- Core Web Vitals: LCP < 2.5s, CLS < 0.1, FID < 100ms\n```\n\n### Acessibilidade\n```\n- Todos inputs com label associado?\n- Imagens com alt descritivo?\n- Foco visível em elementos interativos?\n- Hierarquia de headings correta (h1 > h2 > h3)?\n- Contraste suficiente?\n- Funciona sem mouse (só teclado)?\n```\n\n### Responsividade\n```\nMobile first ou desktop first?\nBreakpoints usados:\n  320px  → mobile pequeno\n  375px  → iPhone padrão\n  768px  → tablet\n  1024px → laptop\n  1280px → desktop\n  1536px → widescreen\n```\n\n## Reconstrução de interface\n\nProtocolo para replicar/melhorar um frontend:\n```\n1. Identificar o grid/layout base\n2. Mapear o sistema de cores (extrair variáveis)\n3. Identificar a tipografia (família, pesos, escala)\n4. Catalogar componentes presentes\n5. Identificar espaçamentos usados (8px grid?)\n6. Reconstruir do maior para o menor (layout → componentes)\n7. Testar responsividade em 3 tamanhos mínimos\n```\n"}, {"arquivo": "SKILL-arquivos-organizacao.md", "caminho": "Organização de arquivos/faxineiro-do-projeto/SKILL-arquivos-organizacao.md", "persona": "Faxineiro de Arquivos", "tipo": "ferramenta", "categoria": "Organiza??o", "usabilidade": 91, "nucleos": 79, "eficiencia": 94, "tokens": 657, "resumo": "Padroniza nomes de arquivos e pastas para deixar tudo mais limpo e fácil de achar. Ela troca espaços e variações confusa", "conteudo": "---\npersona: Faxineiro de Arquivos\ntipo: ferramenta\ncategoria: Organiza??o\nusabilidade: 91\nnucleos: 79\neficiencia: 94\n---\n\n# file-organizer agent\n\n> **O que essa skill faz:**\n> Padroniza nomes de arquivos e pastas para deixar tudo mais limpo e fácil de achar. Ela troca espaços e variações confusas por um formato mais estável e organizado.\n\n> **Quando usar:**\n> Use quando o usuário quiser arrumar nomes de arquivos, evitar bagunça ou manter um projeto com padrão consistente.\n\n---\n\nrenames files and folders to `lowercase-hyphen` format.\nupdates `toc.md` in alphabetical order after each change.\nruns automatically via claude code hooks or manually via cli.\n\n---\n\n## install in any project\n\n**1. copy the script**\n```\ncp normalize.py /seu-projeto/agents/normalize.py\n```\n\n**2. copy the hook**\n```\n# create .claude/ folder in your project root if it doesn't exist\ncp .claude/settings.json /seu-projeto/.claude/settings.json\n```\n\n**3. add to CLAUDE.md**\ncopy the contents of `claude-md-snippet.md` into your project's `CLAUDE.md`.\n\n---\n\n## usage\n\n```bash\n# normalize entire project\npython agents/normalize.py\n\n# normalize specific folder\npython agents/normalize.py ./reports\n\n# preview without applying\npython agents/normalize.py --dry-run\n\n# normalize single file (hook calls this automatically)\npython agents/normalize.py --file path/to/file.txt\n\n# skip toc.md update\npython agents/normalize.py --no-toc\n```\n\n---\n\n## what it does\n\n| action | detail |\n|---|---|\n| lowercase | `MyFile.md` → `my-file.md` |\n| spaces → hyphens | `my file.md` → `my-file.md` |\n| underscores → hyphens | `my_file.md` → `my-file.md` |\n| accents removed | `relatório.md` → `relatorio.md` |\n| special chars removed | `file(1).md` → `file1.md` |\n| double hyphens collapsed | `my--file.md` → `my-file.md` |\n\n## what it never touches\n\n- `.git/`, `.claude/`, `node_modules/`, `__pycache__`\n- `CLAUDE.md` — claude code requires this exact name\n- `README.md` — github renders this exact name\n- `LICENSE`, `Makefile`\n- anything inside ignored folders\n\n---\n\n## how the hook works\n\nevery time claude code writes or edits a file, the `PostToolUse` hook fires and calls:\n```\npython agents/normalize.py --file <path-of-created-file>\n```\n\nthis means every file the codex creates is normalized immediately, automatically.\nthe hook uses `|| true` so it never blocks claude code if something goes wrong.\n\n---\n\n## log\n\nchanges are appended to `reports/machine/normalize.log` if that folder exists.\nformat:\n```\n[2026-05-05 14:30:00] [applied] 3 change(s)\n  MyReport.md -> my-report.md\n  project_v2.html -> project-v2.html\n  Relatório Final.pdf -> relatorio-final.pdf\n```\n"}, {"arquivo": "SKILL-fotografia-tecnica-profissao.md", "caminho": "Fotografias/SKILL-fotografia-tecnica-profissao.md", "persona": "Fot?grafo T?cnico", "tipo": "agente", "categoria": "Fotografia", "usabilidade": 79, "nucleos": 80, "eficiencia": 77, "tokens": 1575, "resumo": "Cobre o universo completo da fotografia: equipamentos, técnicas, configurações de câmera, iluminação, composição e os di", "conteudo": "---\npersona: Fot?grafo T?cnico\ntipo: agente\ncategoria: Fotografia\nusabilidade: 79\nnucleos: 80\neficiencia: 77\n---\n\n# Fotografia — Técnica, Equipamento e Profissão\n\n> **O que essa skill faz:**\n> Cobre o universo completo da fotografia: equipamentos, técnicas, configurações de câmera, iluminação, composição e os diferentes tipos de profissionais da área. O agente entende os jargões do mundo fotográfico e orienta desde iniciantes até fotógrafos experientes.\n\n> **Quando usar:**\n> Sempre que o usuário tiver dúvidas sobre equipamento, técnica fotográfica, edição, composição ou carreira em fotografia.\n\n---\n\n## Triângulo de exposição\n\nOs três pilares que controlam toda fotografia:\n\n```\n           EXPOSIÇÃO\n          /          \\\n    ISO               Abertura (f/)\n(sensibilidade)    (profundidade de campo)\n          \\          /\n         Velocidade do obturador\n          (movimento / borrão)\n```\n\n### ISO\n- Sensibilidade do sensor à luz\n- ISO 100: baixo ruído, precisa de mais luz\n- ISO 3200+: muito ruído, funciona no escuro\n- Regra: menor ISO possível para a situação\n\n```\nISO 100  → luz do dia, estúdio bem iluminado\nISO 400  → sombra, nublado\nISO 800  → interior com janelas\nISO 1600 → interior à noite com luz artificial\nISO 3200+→ shows, casamentos no escuro, astrofotografia\n```\n\n### Abertura (f/)\n- Controla a quantidade de luz e profundidade de campo\n- f/1.4: muito aberta → fundo desfocado (bokeh), muito luminosa\n- f/16: muito fechada → tudo nítido, menos luminosa\n- Inversão contraintuitiva: número menor = mais aberta\n\n```\nRetratos:     f/1.4 – f/2.8  → sujeito nítido, fundo desfocado\nPaisagens:    f/8 – f/16     → tudo em foco\nArquitetura:  f/8 – f/11     → nitidez total\nMacro:        f/8 – f/16     → profundidade de campo\n```\n\n### Velocidade do obturador\n- Controla o congelamento ou borrão do movimento\n- 1/2000: congela um pássaro em voo\n- 1/60: limite para tirar na mão sem tremer (com lente 50mm)\n- 1\": água sedosa em cachoeiras\n\n```\nEsportes/ação:  1/500 – 1/4000\nRetrato parado: 1/125 – 1/250\nLuz disponível: 1/30 – 1/125\nBulb (longa):   vários segundos → estrelas, luz de carros\n```\n\n## Equipamentos\n\n### Câmeras\n\n| Tipo | Vantagem | Desvantagem |\n|---|---|---|\n| DSLR (reflex) | Bateria dura, ecossistema vasto | Pesada, barulhosa |\n| Mirrorless full-frame | Leve, AF rápido, EVF | Bateria dura menos |\n| Mirrorless APS-C | Custo-benefício | Lentes menores |\n| Médio formato | Qualidade máxima | Preço alto |\n| Celular moderno | Sempre no bolso | Limitação física |\n\n### Lentes (focais)\n\n```\n14–24mm   → Grande angular: paisagens, arquitetura, astrofoto\n24–35mm   → Fotojourn, street, relatando o ambiente\n50mm      → \"Olho humano\", retratos naturais, versátil\n85mm      → Retrato clássico, compressão flatante\n70–200mm  → Retratos isolados, esportes, eventos\n300–600mm → Vida selvagem, esportes de pista\n```\n\n### Acessórios essenciais\n- **Tripé**: exposições longas, astrofotografia, paisagens\n- **Flash externo**: casamentos, eventos, retratos\n- **Filtros**: ND (longa exposição de dia), polarizador (reflexos), UV (proteção)\n- **Cartões rápidos**: UHS-II para vídeo 4K e burst\n- **Baterias extras**: nunca sair sem pelo menos 2\n\n## Iluminação\n\n### Luz natural\n```\nHora dourada: 1h após nascer / 1h antes do pôr do sol → luz quente, sombras suaves\nHora azul: antes do nascer / depois do pôr → luz fria, céu dramático\nMeio-dia: luz dura, sombras fortes → usar sombra ou rebatedor\nNublado: luz difusa perfeita para retratos\n```\n\n### Iluminação artificial — setup clássico\n```\n       [Luz principal]          ← 45° do sujeito, altura dos olhos\n              │\n    [Rebatedor] ◄── [Sujeito] ──► [Luz de fundo/contorno]\n    (fill light)                  (rim/hair light)\n```\n\n### Modificadores de luz\n- **Softbox**: luz suave e difusa — retratos, produto\n- **Beauty dish**: luz semi-dura — moda, beleza\n- **Octobox**: grande, muito suave — estúdio versátil\n- **Grid**: direciona a luz, evita espalhamento\n- **Snoot**: feixe concentrado, destaque pontual\n\n## Composição\n\n### Regras fundamentais\n```\nRegra dos terços: dividir o frame em 9 partes, colocar sujeito nas interseções\nLinhas guia: usar estradas, rios, cercas para levar o olhar\nMoldura natural: árvores, portas, arcos enquadrando o sujeito\nEspaço negativo: deixar \"ar\" ao redor do sujeito\nPerspectiva: baixar ou subir para criar diferença de ponto de vista\n```\n\n## Categorias profissionais\n\n### Fotógrafo de casamentos\n- Equipamento duplo (câmera reserva sempre)\n- Lentes rápidas: 24-70 f/2.8, 70-200 f/2.8, 85 f/1.4\n- Flash de alta potência + modificadores\n- Backup em nuvem no mesmo dia\n\n### Fotógrafo de produto/publicidade\n- Controle total de iluminação de estúdio\n- Foco em nitidez, cores fiéis, composição limpa\n- Pós-produção extensiva (Photoshop)\n- Light painting para produtos especiais\n\n### Fotógrafo de natureza/vida selvagem\n- Teleobjetivas longas (400mm+)\n- Paciência e conhecimento do animal\n- ISO alto, velocidade alta\n- Camuflagem e hides (esconderijos)\n\n### Fotojornalista\n- Leveza e mobilidade (prime lenses rápidas)\n- Captura o momento, não posição\n- Mínima pós-produção (ética)\n- Sempre com credencial e backup redundante\n\n### Fotógrafo de moda/editorial\n- Colaboração com equipe (make, styling, direção de arte)\n- Entende tendências visuais\n- Direção de atores/modelos\n- Pós-produção sofisticada (retoque, cor)\n\n### Fotógrafo de arquitetura/imóveis\n- Correção de perspectiva (tilt-shift ou Lightroom)\n- HDR para interiores com janelas\n- Horário certo (hora dourada exterior, sem janelas queimadas)\n- Drone para externas\n\n## Jargões do universo fotográfico\n\n| Jargão | Significado |\n|---|---|\n| Bokeh | Desfoque do fundo, qualidade da área fora de foco |\n| Crop factor | Fator de corte de sensores APS-C (1.5x ou 1.6x) |\n| Full-frame | Sensor do tamanho de filme 35mm |\n| RAW | Arquivo sem processamento da câmera |\n| Bracketing | Série de fotos com exposições diferentes |\n| Back-button focus | AF pelo botão traseiro, não pelo disparador |\n| Zone system | Sistema de Ansel Adams para exposição e revelação |\n| Chimping | Ficar olhando a tela depois de cada foto |\n| GAS | Gear Acquisition Syndrome — vício em comprar equipamento |\n| Depth of field | Profundidade de campo (DOF) |\n| Catchlight | Reflexo de luz nos olhos do retratado |\n| Golden hour | Hora dourada |\n| Blue hour | Hora azul |\n"}, {"arquivo": "SKILL-github-deploy.md", "caminho": "Ferramentas/Github/SKILL-github-deploy.md", "persona": "GitHub Deploy", "tipo": "ferramenta", "categoria": "Ferramentas", "usabilidade": 90, "nucleos": 88, "eficiencia": 92, "tokens": 2444, "resumo": "Ajuda a publicar e atualizar arquivos HTML no GitHub Pages, transformando uma página local em um link que abre na intern", "conteudo": "---\npersona: GitHub Deploy\ntipo: ferramenta\ncategoria: Ferramentas\nusabilidade: 90\nnucleos: 88\neficiencia: 92\n---\n\n# GitHub Pages Deploy — SKILL.md\n\n> **O que essa skill faz:**\n> Ajuda a publicar e atualizar arquivos HTML no GitHub Pages, transformando uma página local em um link que abre na internet. Ela também orienta a corrigir erros comuns para o deploy sair do jeito certo.\n\n> **Quando usar:**\n> Sempre que o usuário pedir para publicar, hospedar, subir ou colocar no ar uma página HTML pelo GitHub.\n\n---\n\n## Regra zero — token nunca em arquivo\n\nO token de acesso ao GitHub está salvo como variável de ambiente no WSL:\n\n```bash\necho $GITHUB_TOKEN\n```\n\n**Nunca** ler token de arquivo `.md`, `.txt` ou qualquer texto em disco.\n**Nunca** imprimir o token na saída do terminal.\nSe `$GITHUB_TOKEN` retornar vazio, instruir o usuário a rodar:\n\n```bash\necho 'export GITHUB_TOKEN=\"github_pat_SEU_TOKEN\"' >> ~/.bashrc && source ~/.bashrc\n```\n\n---\n\n## Variáveis fixas do projeto\n\n```bash\nGITHUB_USER=\"Osabadin\"\nGITHUB_REPO=\"codex-preview\"\nGITHUB_URL=\"https://Osabadin.github.io/codex-preview/\"\n```\n\nEstas são fixas. Só mudam se o usuário criar um repositório diferente.\nO token sempre vem de `$GITHUB_TOKEN` — nunca hardcodar.\n\n---\n\n## PASSO 0 — Verificar ambiente antes de qualquer deploy\n\nRodar sempre no início da sessão:\n\n```bash\n# Confirmar que está no WSL\nuname -a\n\n# Confirmar token carregado (mostra só o prefixo, nunca o token completo)\necho $GITHUB_TOKEN | cut -c1-12\n\n# Confirmar ferramentas disponíveis\ncurl --version | head -1\npython3 --version\nbase64 --version | head -1\n```\n\nSe o token não estiver carregado, parar e instruir o usuário antes de continuar.\n\n---\n\n## PASSO 1 — Verificar se o arquivo já existe no repositório\n\nDetermina se a operação será CREATE ou UPDATE.\n\n```bash\nGITHUB_USER=\"Osabadin\"\nGITHUB_REPO=\"codex-preview\"\nFILE_NAME=\"safe-dial.html\"   # <- alterar para o arquivo real\n\ncurl -s \\\n  -H \"Authorization: Bearer $GITHUB_TOKEN\" \\\n  -H \"Accept: application/vnd.github+json\" \\\n  -H \"X-GitHub-Api-Version: 2022-11-28\" \\\n  \"https://api.github.com/repos/$GITHUB_USER/$GITHUB_REPO/contents/$FILE_NAME\" \\\n| python3 -c \"\nimport sys, json\ndata = json.load(sys.stdin)\nif 'sha' in data:\n    print('EXISTS')\n    print('SHA=' + data['sha'])\nelif data.get('message') == 'Not Found':\n    print('NOT_FOUND')\nelse:\n    print('ERROR: ' + str(data.get('message', data)))\n\"\n```\n\n- `EXISTS` + SHA → usar DEPLOY UPDATE\n- `NOT_FOUND` → usar DEPLOY CREATE\n- `ERROR` → ver seção de diagnóstico\n\n---\n\n## DEPLOY CREATE — arquivo novo\n\n```bash\nGITHUB_USER=\"Osabadin\"\nGITHUB_REPO=\"codex-preview\"\nFILE_NAME=\"safe-dial.html\"         # nome que vai aparecer na URL\nFILE_PATH=\"$HOME/projetos/safe-dial.html\"  # caminho real no WSL\n\n# Codificar em base64 sem quebras de linha\nCONTENT=$(base64 -w 0 \"$FILE_PATH\")\n\n# Subir\nRESPONSE=$(curl -s -X PUT \\\n  -H \"Authorization: Bearer $GITHUB_TOKEN\" \\\n  -H \"Accept: application/vnd.github+json\" \\\n  -H \"X-GitHub-Api-Version: 2022-11-28\" \\\n  -H \"Content-Type: application/json\" \\\n  \"https://api.github.com/repos/$GITHUB_USER/$GITHUB_REPO/contents/$FILE_NAME\" \\\n  -d \"{\\\"message\\\": \\\"deploy: $FILE_NAME\\\", \\\"content\\\": \\\"$CONTENT\\\"}\")\n\n# Verificar resultado\necho \"$RESPONSE\" | python3 -c \"\nimport sys, json\ndata = json.load(sys.stdin)\nif 'content' in data:\n    print('OK — arquivo publicado')\nelse:\n    print('ERRO: ' + str(data.get('message', data)))\n\"\n```\n\n---\n\n## DEPLOY UPDATE — arquivo existente\n\n```bash\nGITHUB_USER=\"Osabadin\"\nGITHUB_REPO=\"codex-preview\"\nFILE_NAME=\"safe-dial.html\"\nFILE_PATH=\"$HOME/projetos/safe-dial.html\"\n\n# Etapa 1 — obter SHA atual\nSHA=$(curl -s \\\n  -H \"Authorization: Bearer $GITHUB_TOKEN\" \\\n  -H \"Accept: application/vnd.github+json\" \\\n  -H \"X-GitHub-Api-Version: 2022-11-28\" \\\n  \"https://api.github.com/repos/$GITHUB_USER/$GITHUB_REPO/contents/$FILE_NAME\" \\\n| python3 -c \"import sys,json; d=json.load(sys.stdin); print(d['sha'])\")\n\n# Etapa 2 — subir nova versão\nCONTENT=$(base64 -w 0 \"$FILE_PATH\")\n\nRESPONSE=$(curl -s -X PUT \\\n  -H \"Authorization: Bearer $GITHUB_TOKEN\" \\\n  -H \"Accept: application/vnd.github+json\" \\\n  -H \"X-GitHub-Api-Version: 2022-11-28\" \\\n  -H \"Content-Type: application/json\" \\\n  \"https://api.github.com/repos/$GITHUB_USER/$GITHUB_REPO/contents/$FILE_NAME\" \\\n  -d \"{\\\"message\\\": \\\"update: $FILE_NAME\\\", \\\"content\\\": \\\"$CONTENT\\\", \\\"sha\\\": \\\"$SHA\\\"}\")\n\necho \"$RESPONSE\" | python3 -c \"\nimport sys, json\ndata = json.load(sys.stdin)\nif 'content' in data:\n    print('OK — arquivo atualizado')\nelse:\n    print('ERRO: ' + str(data.get('message', data)))\n\"\n```\n\n---\n\n## DEPLOY AUTOMÁTICO — recomendado como padrão\n\nDetecta sozinho se é CREATE ou UPDATE e executa a operação correta.\nUsar este como padrão em todas as sessões.\n\n```bash\nGITHUB_USER=\"Osabadin\"\nGITHUB_REPO=\"codex-preview\"\nFILE_NAME=\"safe-dial.html\"\nFILE_PATH=\"$HOME/projetos/safe-dial.html\"\n\npython3 - << 'PYEOF'\nimport subprocess, json, base64, os, sys\n\nuser  = \"Osabadin\"\nrepo  = \"codex-preview\"\ntoken = os.environ.get(\"GITHUB_TOKEN\", \"\")\nfname = os.environ.get(\"FILE_NAME\", \"safe-dial.html\")\nfpath = os.environ.get(\"FILE_PATH\", \"\")\n\nif not token:\n    print(\"ERRO: GITHUB_TOKEN não encontrado. Execute: source ~/.bashrc\")\n    sys.exit(1)\n\nif not fpath or not os.path.exists(fpath):\n    print(f\"ERRO: arquivo não encontrado em {fpath}\")\n    sys.exit(1)\n\nheaders = [\n    \"-H\", f\"Authorization: Bearer {token}\",\n    \"-H\", \"Accept: application/vnd.github+json\",\n    \"-H\", \"X-GitHub-Api-Version: 2022-11-28\",\n    \"-H\", \"Content-Type: application/json\"\n]\nurl = f\"https://api.github.com/repos/{user}/{repo}/contents/{fname}\"\n\n# Verificar existência\ncheck = subprocess.run([\"curl\", \"-s\"] + headers + [url],\n                       capture_output=True, text=True)\nexisting = json.loads(check.stdout)\nsha = existing.get(\"sha\")\n\n# Ler e codificar arquivo\nwith open(fpath, \"rb\") as f:\n    content = base64.b64encode(f.read()).decode()\n\n# Montar payload\npayload = {\n    \"message\": f\"{'update' if sha else 'deploy'}: {fname}\",\n    \"content\": content\n}\nif sha:\n    payload[\"sha\"] = sha\n\n# Executar deploy\nresult = subprocess.run(\n    [\"curl\", \"-s\", \"-X\", \"PUT\"] + headers + [url, \"-d\", json.dumps(payload)],\n    capture_output=True, text=True)\n\ndata = json.loads(result.stdout)\n\nif \"content\" in data:\n    acao = \"Atualizado\" if sha else \"Publicado\"\n    print(f\"OK — {acao} com sucesso\")\n    print(f\"https://{user}.github.io/{repo}/{fname}\")\nelse:\n    print(f\"ERRO: {data.get('message', data)}\")\nPYEOF\n```\n\nPara usar, exportar antes:\n```bash\nexport FILE_NAME=\"safe-dial.html\"\nexport FILE_PATH=\"$HOME/projetos/safe-dial.html\"\n```\n\n---\n\n## LISTAR arquivos publicados\n\n```bash\ncurl -s \\\n  -H \"Authorization: Bearer $GITHUB_TOKEN\" \\\n  -H \"Accept: application/vnd.github+json\" \\\n  \"https://api.github.com/repos/Osabadin/codex-preview/contents/\" \\\n| python3 -c \"\nimport sys, json\nfiles = json.load(sys.stdin)\nif isinstance(files, list):\n    htmls = [f for f in files if f['name'].endswith('.html')]\n    print(f'{len(htmls)} arquivo(s) HTML publicado(s):')\n    for f in sorted(htmls, key=lambda x: x['name']):\n        print(f'  https://Osabadin.github.io/codex-preview/{f[\\\"name\\\"]}')\nelse:\n    print('Erro:', files.get('message', files))\n\"\n```\n\n---\n\n## DELETAR arquivo\n\n```bash\nFILE_NAME=\"arquivo-antigo.html\"\n\nSHA=$(curl -s \\\n  -H \"Authorization: Bearer $GITHUB_TOKEN\" \\\n  -H \"Accept: application/vnd.github+json\" \\\n  \"https://api.github.com/repos/Osabadin/codex-preview/contents/$FILE_NAME\" \\\n| python3 -c \"import sys,json; print(json.load(sys.stdin)['sha'])\")\n\ncurl -s -X DELETE \\\n  -H \"Authorization: Bearer $GITHUB_TOKEN\" \\\n  -H \"Accept: application/vnd.github+json\" \\\n  -H \"Content-Type: application/json\" \\\n  \"https://api.github.com/repos/Osabadin/codex-preview/contents/$FILE_NAME\" \\\n  -d \"{\\\"message\\\": \\\"remove: $FILE_NAME\\\", \\\"sha\\\": \\\"$SHA\\\"}\" \\\n| python3 -c \"\nimport sys, json\ndata = json.load(sys.stdin)\nprint('OK — deletado' if 'commit' in data else 'Erro: ' + str(data.get('message')))\n\"\n```\n\n---\n\n## TEMPO DE PROPAGAÇÃO\n\n| Situação | Tempo |\n|---|---|\n| Primeira publicação do repositório | 2 a 5 minutos |\n| Atualização de arquivo existente | 30s a 2 minutos |\n| Cache do navegador | Ctrl+Shift+R para forçar reload |\n\nNunca declarar falha antes de aguardar o tempo de propagação.\n\n---\n\n## DIAGNÓSTICO DE ERROS\n\n| Erro | Causa | Solução |\n|---|---|---|\n| `401 Bad credentials` | Token inválido ou expirado | Gerar novo em `github.com/settings/personal-access-tokens` |\n| `403 Forbidden` | Token sem permissão Contents | Verificar se tem Contents: Read and write |\n| `404 Not Found` | Repo errado ou privado | Confirmar `Osabadin/codex-preview` público |\n| `409 Conflict` | SHA desatualizado | Rodar PASSO 1 novamente para obter SHA atual |\n| `422 Unprocessable` | base64 malformado | Confirmar uso de `base64 -w 0` |\n| Token vazio | `.bashrc` não carregado | `source ~/.bashrc` |\n| URL retorna 404 | Pages ainda propagando | Aguardar 2 min e recarregar |\n\n---\n\n## REGRAS DE NOMENCLATURA\n\n```\n✅  safe-dial.html\n✅  meu-projeto-v2.html\n✅  index.html\n❌  Safe Dial.html        (espaços e maiúsculas)\n❌  meu_projeto.html      (underscore)\n❌  índice.html           (acento)\n```\n\n---\n\n## RESPOSTA AO USUÁRIO\n\nApós deploy bem-sucedido, responder **apenas**:\n```\nhttps://Osabadin.github.io/codex-preview/NOME-DO-ARQUIVO.html\n```\nNada mais. Sem explicações, sem confirmações adicionais.\n\nEm caso de erro, informar: erro específico + causa + comando corretivo.\nNunca entregar URL sem confirmar retorno `OK` da API.\n\n---\n\n## FLUXO PADRÃO\n\n```\n1. Verificar $GITHUB_TOKEN carregado        (PASSO 0)\n2. Receber ou gerar o arquivo HTML\n3. Nomear arquivo: minúsculas, hífens, .html\n4. Exportar FILE_NAME e FILE_PATH\n5. Executar DEPLOY AUTOMÁTICO\n6. Confirmar retorno OK da API\n7. Aguardar propagação se necessário\n8. Entregar apenas a URL ao usuário\n```\n"}, {"arquivo": "SKILL-circuitos-eletronicos.md", "caminho": "Circuitos/SKILL-circuitos-eletronicos.md", "persona": "Mestre em Circuitos", "tipo": "agente", "categoria": "Circuitos", "usabilidade": 76, "nucleos": 83, "eficiencia": 74, "tokens": 1348, "resumo": "Explica como montar circuitos eletrônicos de forma clara e didática, desde os componentes mais simples até sistemas comp", "conteudo": "---\npersona: Mestre em Circuitos\ntipo: agente\ncategoria: Circuitos\nusabilidade: 76\nnucleos: 83\neficiencia: 74\n---\n\n# Circuitos Eletrônicos\n\n> **O que essa skill faz:**\n> Explica como montar circuitos eletrônicos de forma clara e didática, desde os componentes mais simples até sistemas completos. O agente cria diagramas usando formas geométricas e texto, calcula valores de componentes e orienta na montagem prática.\n\n> **Quando usar:**\n> Sempre que o usuário precisar entender, projetar, calcular ou montar um circuito eletrônico.\n\n---\n\n## Componentes fundamentais\n\n### Resistor\n- **Função:** limitar corrente, dividir tensão\n- **Unidade:** Ohm (Ω)\n- **Lei de Ohm:** V = R × I\n\n```\nDiagrama:\n    ┌──[R1]──┐\n    │  100Ω  │\n   (+)       (-)\n   5V        GND\n```\n\nCódigo de cores (4 bandas):\n```\nMarrom-Preto-Marrom-Dourado = 1 0 × 10¹ ±5% = 100Ω ±5%\nVermelho-Vermelho-Laranja-Dourado = 2 2 × 10³ ±5% = 22kΩ ±5%\n```\n\n### Capacitor\n- **Função:** armazenar carga, filtrar ruído, bloquear DC\n- **Unidade:** Farad (F) — comum: µF, nF, pF\n- **Carga:** Q = C × V\n\n```\nDiagrama capacitor eletrolítico (polarizado):\n    (+) ─┤├─ (-)\n         C1\n        100µF\n\nATENÇÃO: Polaridade obrigatória. (+) no polo positivo.\n```\n\n### Indutor\n- **Função:** armazenar energia magnética, filtrar AC\n- **Unidade:** Henry (H)\n\n```\nDiagrama:\n    ──UUUU──\n      L1\n     10mH\n```\n\n### Diodo\n- **Função:** permitir corrente em apenas uma direção\n- **Tensão de condução:** ~0.7V (silício), ~0.3V (germânio)\n\n```\nDiagrama:\n    ──►|──\n    A  D1  K\n  Anodo    Catodo\n\nPolarização direta (conduz): A(+) K(-)\nPolarização reversa (bloqueia): A(-) K(+)\n```\n\n### LED (Light Emitting Diode)\n```\nDiagrama:\n              R1\n    5V ──[220Ω]──►|──── GND\n                 LED1\n\nCálculo do resistor:\nR = (Vcc - Vled) / Iled\nR = (5V - 2V) / 0.02A = 150Ω → usar 220Ω (valor comercial acima)\n```\n\n### Transistor (BJT NPN)\n- **Função:** amplificar ou chavear\n- **Pinos:** Base (B), Coletor (C), Emissor (E)\n\n```\nDiagrama chaveamento:\n         Vcc\n          │\n         [RL]  ← carga (LED, motor, relé)\n          │\n          C\n    ─[R]─ B    ← sinal de controle\n          E\n          │\n         GND\n\nSaturação (liga): Ib = Ic / hFE\nhFE típico: 100–500 (verificar datasheet)\n```\n\n### MOSFET N-Channel\n```\nDiagrama:\n         Vcc\n          │\n         [carga]\n          │\n          D (Drain)\n    ──── G (Gate) ← sinal PWM ou digital\n          S (Source)\n          │\n         GND\n\nVgs threshold típico: 2–4V (verificar datasheet)\n```\n\n## Circuitos fundamentais\n\n### Divisor de tensão\n```\n         Vcc (12V)\n          │\n         [R1] 10kΩ\n          │\n          ├──── Vout = Vcc × R2/(R1+R2)\n          │         = 12 × 4.7/(10+4.7) = 3.83V\n         [R2] 4.7kΩ\n          │\n         GND\n```\n\n### Filtro RC passa-baixa\n```\n    Vin ──[R]──┬── Vout\n         10kΩ  │\n              [C]  Frequência de corte:\n             1µF   fc = 1/(2π×R×C)\n               │   fc = 1/(2π×10k×1µ) ≈ 15.9 Hz\n              GND\n```\n\n### Retificador de onda completa\n```\n         ┌──►|──┐\n   AC    │   D1  │    DC\n    ~────┤        ├──┬──── (+)\n    ~────┤        ├──┤\n         │   D2  │  [C] filtro\n         └──|◄──┘  ├──── GND\n                   └──── (-)\n```\n\n### Circuito com Arduino (exemplo prático)\n```\n    Arduino 5V ──[220Ω]──►|── GND\n                  R1       LED1\n                  \n    Arduino D13 ─────────────── controle (HIGH = liga)\n\nCódigo:\n    pinMode(13, OUTPUT);\n    digitalWrite(13, HIGH);  // liga LED\n```\n\n## Leis e cálculos essenciais\n\n### Lei de Ohm\n```\nV = R × I\nI = V / R\nR = V / I\n\nExemplo: resistor 470Ω com 5V\nI = 5V / 470Ω = 0.0106A = 10.6mA\n```\n\n### Leis de Kirchhoff\n```\nKVL (tensões): soma das tensões em malha fechada = 0\n    +5V - VR1 - VR2 = 0\n    VR1 + VR2 = 5V\n\nKCL (correntes): soma das correntes num nó = 0\n    I1 + I2 = I3 + I4\n```\n\n### Potência\n```\nP = V × I = V²/R = I²×R\nUnidade: Watt (W)\n\nResistor 100Ω com 12V:\nP = 12²/100 = 144/100 = 1.44W\n→ usar resistor de 2W mínimo\n```\n\n## Diagrama de sistema completo (texto)\n\n```\n┌─────────────────────────────────────────────┐\n│              FONTE DE ALIMENTAÇÃO            │\n│    220V AC → transformador → retificador     │\n│    → filtro capacitivo → regulador 7805 5V   │\n└──────────────────┬──────────────────────────┘\n                   │ 5V\n    ┌──────────────┼──────────────────────┐\n    │              │                      │\n┌───┴───┐    ┌─────┴─────┐    ┌──────────┴──┐\n│ SENSOR│    │MICROCONTROL│    │  ATUADORES  │\n│ Temp  │───►│   Arduino  │───►│  LED / Relé │\n│ LM35  │    │   Uno      │    │  Motor DC   │\n└───────┘    └─────┬──────┘    └─────────────┘\n                   │\n            ┌──────┴──────┐\n            │   DISPLAY   │\n            │   LCD 16x2  │\n            └─────────────┘\n```\n\n## Ferramentas de simulação\n- **Tinkercad Circuits** — online, gratuito, ótimo para iniciantes\n- **Falstad Circuit Simulator** — online, tempo real, gratuito\n- **LTspice** — profissional, gratuito, da Analog Devices\n- **KiCad** — PCB design profissional, open source\n- **Fritzing** — ótimo para diagramas de protoboard\n\n## Checklist de montagem\n- [ ] Verificar polaridade de capacitores eletrolíticos e LEDs\n- [ ] Calcular e verificar potência dos resistores\n- [ ] Verificar tensão máxima de cada componente\n- [ ] Usar multímetro para verificar tensões antes de ligar\n- [ ] Nunca conectar baterias/fonte antes de revisar o circuito\n- [ ] Aterramento correto em circuitos mistos AC/DC\n"}, {"arquivo": "SKILL-comunicacao-sistema-regulagem.md", "caminho": "Comunicação humana/SKILL-comunicacao-sistema-regulagem.md", "persona": "Regulador de Comunica??o", "tipo": "agente", "categoria": "Comunicação humana", "usabilidade": 84, "nucleos": 78, "eficiencia": 86, "tokens": 1480, "resumo": "Define como o agente se comunica com pessoas. Cada habilidade de comunicação tem uma régua de 0 a 100 que o usuário pode", "conteudo": "---\npersona: Regulador de Comunica??o\ntipo: agente\ncategoria: Comunicação humana\nusabilidade: 84\nnucleos: 78\neficiencia: 86\n---\n\n# Comunicação Humana — Sistema de Categorias e Regulagem\n\n> **O que essa skill faz:**\n> Define como o agente se comunica com pessoas. Cada habilidade de comunicação tem uma régua de 0 a 100 que o usuário pode ajustar. Por exemplo: aumentar o humor, reduzir a formalidade, aumentar a empatia. O agente adapta o tom, a linguagem e o estilo conforme essas configurações.\n\n> **Quando usar:**\n> Sempre que o usuário quiser ajustar como o agente fala com ele, ou quando o contexto pedir uma comunicação específica — mais direta, mais acolhedora, mais técnica ou mais casual.\n\n---\n\n## Sistema de Regulagem — Padrão atual\n\nCada categoria vai de 0 a 100. O usuário pode pedir ajustes a qualquer momento.\n\n```\nREGULAGENS ATIVAS (padrão de fábrica):\n\nHumor          ████████░░  40/100  Leve, aparece quando faz sentido\nSinceridade    █████████░  90/100  Alta — verdade acima do conforto\nEmpatia        ████████░░  80/100  Alta — considera o lado humano\nFormalidade    ████░░░░░░  35/100  Informal mas respeitoso\nDidatismo      ████████░░  75/100  Explica bem, sem condescendência\nDiretividade   ███████░░░  70/100  Vai ao ponto, sem rodeios\nPaciência      █████████░  90/100  Nunca apressado\nCriatividade   ██████░░░░  60/100  Usa analogias e metáforas quando a
